<script>
createDateSelects('dateSelects', 1995, 3, 20);

// 연도 옵션
const yearSelect = document.getElementById('fortuneYear');
const thisYear = new Date().getFullYear();
for (let y = thisYear - 5; y <= thisYear + 4; y++) {
  const opt = document.createElement('option');
  opt.value = y;
  opt.textContent = y + _L('년','') + (y === thisYear ? ' ' + _L('(올해)','(This year)') : '');
  if (y === thisYear) opt.selected = true;
  yearSelect.appendChild(opt);
}

async function doFortune() {
  const btn = document.getElementById('fortuneBtn');
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');
  btn.disabled = true;
  loading.style.display = 'flex';
  result.style.display = 'none';

  try {
    const resp = await fetch(API_BASE + '/api/fortune', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        birth_date: getBirthDate(),
        birth_time: document.getElementById('birthTime').value,
        gender: document.getElementById('gender').value,
        year: parseInt(document.getElementById('fortuneYear').value),
        lang: localStorage.getItem('karma_lang') || 'ko',
      }),
    });
    if (!resp.ok) { alert(_L('서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.','A server error occurred. Please try again later.')); return; }
    const data = await resp.json();
    if (data.error || !data.fortune) { alert(data.error || _L('운세 분석 실패','Fortune analysis failed')); return; }
    renderFortune(data);
  } catch(e) {
    alert(_L('오류: ','Error: ') + e.message);
  } finally {
    btn.disabled = false;
    loading.style.display = 'none';
  }
}

function renderFortune(d) {
  const f = d.fortune;
  const OHANG_EMOJI = {'목':'🌿','화':'🔥','토':'🏔','금':'⚔','수':'🌊'};

  document.getElementById('fortuneYearTitle').textContent = '📅 ' + _L(d.year + '년 운세', d.year + ' Fortune');
  document.getElementById('sajuInfo').textContent = _L('일간: ','Day Master: ') + d.ilgan + ' ' + (OHANG_EMOJI[d.ilganOhang]||'') + d.ilganOhang + ' | ' + d.saju_summary;
  document.getElementById('fortuneSummary').textContent = f.year_summary || '';
  document.getElementById('fortuneLove').textContent = f.love || '';
  document.getElementById('fortuneMoney').textContent = f.money || '';
  document.getElementById('fortuneCareer').textContent = f.career || '';
  document.getElementById('fortuneHealth').textContent = f.health || '';
  document.getElementById('fortuneAdvice').textContent = f.advice || '';

  // 행운
  if (f.lucky) {
    document.getElementById('fortuneLucky').innerHTML =
      (f.lucky.color ? '<span class="tag tag-good">' + _L('🎨 행운의 색: ','🎨 Lucky Color: ') + esc(f.lucky.color) + '</span>' : '') +
      (f.lucky.number ? '<span class="tag tag-good">' + _L('🔢 행운의 숫자: ','🔢 Lucky Number: ') + esc(String(f.lucky.number)) + '</span>' : '') +
      (f.lucky.direction ? '<span class="tag tag-good">' + _L('🧭 행운의 방향: ','🧭 Lucky Direction: ') + esc(f.lucky.direction) + '</span>' : '') +
      (f.lucky.month ? '<span class="tag tag-good">' + _L('📅 최고의 달: ','📅 Best Month: ') + esc(String(f.lucky.month)) + '</span>' : '');
  }

  document.getElementById('result').style.display = 'grid';
  document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
<script>
function changeLang(lang) {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-ko][data-en]').forEach(el => {
    el.textContent = el.dataset[lang];
  });
  if (typeof updateComboLang === 'function') updateComboLang(lang);
  localStorage.setItem('karma_lang', lang);
}
(function() {
  const saved = localStorage.getItem('karma_lang');
  if (saved) {
    document.getElementById('langSelect').value = saved;
    if (saved !== 'ko') changeLang(saved);
  }
})();
</script>
