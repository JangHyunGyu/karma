<script>
createDateSelects('dateSelects');

// 연도 옵션
const yearSelect = document.getElementById('fortuneYear');
const thisYear = new Date().getFullYear();
for (let y = thisYear - 5; y <= thisYear + 4; y++) {
  const opt = document.createElement('option');
  opt.value = y;
  opt.dataset.ko = y + '년' + (y === thisYear ? ' (올해)' : '');
  opt.dataset.en = y + (y === thisYear ? ' (This year)' : '');
  opt.textContent = opt.dataset.ko;
  if (y === thisYear) opt.selected = true;
  yearSelect.appendChild(opt);
}

async function doFortune() {
  const btn = document.getElementById('fortuneBtn');
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');
  btn.disabled = true;
  loading.style.display = 'flex';
  result.style.display = 'none';

  try {
    const fortuneInput = {
      birth_date: getBirthDate(),
      birth_time: document.getElementById('birthTime').value,
      gender: document.getElementById('gender').value,
      year: parseInt(document.getElementById('fortuneYear').value),
      lang: 'ko',
      yajasi: document.getElementById('yajasiToggle')?.checked || false,
      birth_location: document.getElementById('birthLocation')?.value || 'kr',
    };
    const resp = await fetch(API_BASE + '/api/fortune', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(fortuneInput),
    });
    if (!resp.ok) { alert(_L('서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.','A server error occurred. Please try again later.')); return; }
    const data = await resp.json();
    if (data.error || !data.fortune) { alert(data.error || _L('운세 분석 실패','Fortune analysis failed')); return; }
    window._fortuneInput = fortuneInput;
    window._fortuneResult = data;
    renderFortune(data);
  } catch(e) {
    alert(_L('오류: ','Error: ') + e.message);
  } finally {
    btn.disabled = false;
    loading.style.display = 'none';
  }
}

function renderFortune(d) {
  const f = d.fortune;
  const OHANG_EMOJI = {'목':'🌿','화':'🔥','토':'🏔','금':'⚔','수':'🌊'};

  document.getElementById('fortuneYearTitle').textContent = '📅 ' + _L(d.year + '년 운세', d.year + ' Fortune');
  document.getElementById('sajuInfo').textContent = _L('일간: ','Day Master: ') + d.ilgan + ' ' + (OHANG_EMOJI[d.ilganOhang]||'') + d.ilganOhang + ' | ' + d.saju_summary;
  document.getElementById('fortuneSummary').textContent = f.year_summary || '';
  document.getElementById('fortuneLove').textContent = f.love || '';
  document.getElementById('fortuneMoney').textContent = f.money || '';
  document.getElementById('fortuneCareer').textContent = f.career || '';
  document.getElementById('fortuneHealth').textContent = f.health || '';
  document.getElementById('fortuneAdvice').textContent = f.advice || '';

  // 행운
  if (f.lucky) {
    document.getElementById('fortuneLucky').innerHTML =
      (f.lucky.color ? '<span class="tag tag-good">' + _L('🎨 행운의 색: ','🎨 Lucky Color: ') + esc(f.lucky.color) + '</span>' : '') +
      (f.lucky.number ? '<span class="tag tag-good">' + _L('🔢 행운의 숫자: ','🔢 Lucky Number: ') + esc(String(f.lucky.number)) + '</span>' : '') +
      (f.lucky.direction ? '<span class="tag tag-good">' + _L('🧭 행운의 방향: ','🧭 Lucky Direction: ') + esc(f.lucky.direction) + '</span>' : '') +
      (f.lucky.month ? '<span class="tag tag-good">' + _L('📅 최고의 달: ','📅 Best Month: ') + esc(String(f.lucky.month)) + '</span>' : '');
  }

  document.getElementById('result').style.display = 'grid';
  document.getElementById('shareCard').style.display = 'block';
  document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
}

function handleShareKakao() {
  const isEn = (document.documentElement.lang === 'en');
  const yr = (window._fortuneInput && window._fortuneInput.year) || new Date().getFullYear();
  KarmaShare.shareKakao(
    isEn ? `My ${yr} Fortune` : `내 ${yr}년 신년운세`,
    isEn ? 'AI-powered new year fortune — check my result' : '사주 기반 AI 신년운세 결과를 확인해보세요'
  );
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function _restoreFortuneInput(input) {
  if (!input) return;
  try {
    if (input.birth_date) {
      const [y, m, d] = input.birth_date.split('-');
      const by = document.getElementById('birthYear');
      const bm = document.getElementById('birthMonth');
      const bd = document.getElementById('birthDay');
      if (by) by.value = String(parseInt(y, 10));
      if (bm) bm.value = String(parseInt(m, 10));
      if (bd) bd.value = String(parseInt(d, 10));
    }
    if (input.birth_time) { const el = document.getElementById('birthTime'); if (el) el.value = input.birth_time; }
    if (input.gender) { const el = document.getElementById('gender'); if (el) el.value = input.gender; }
    if (input.year) { const el = document.getElementById('fortuneYear'); if (el) el.value = String(input.year); }
    const yt = document.getElementById('yajasiToggle'); if (yt) yt.checked = !!input.yajasi;
    const bl = document.getElementById('birthLocation'); if (bl && input.birth_location) bl.value = input.birth_location;
  } catch (_) {}
}

KarmaShare.init({
  type: 'fortune',
  lang: (document.documentElement.lang === 'en' ? 'en' : 'ko'),
  pageBase: '/fortune',
  getPayload: () => ({ input: window._fortuneInput || null, result: window._fortuneResult || null }),
  onLoadShared: ({ input, result }) => {
    window._fortuneInput = input;
    window._fortuneResult = result;
    _restoreFortuneInput(input);
    renderFortune(result);
  },
});
</script>
