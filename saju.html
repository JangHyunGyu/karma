  '신': { symbol: ['보석','Jewel'], nature: ['금(金)','Metal (金)'], desc: ['예리하고 섬세한 완벽주의자. 아름다움을 추구하며 날카로운 분석력을 가짐','A sharp and delicate perfectionist. Pursues beauty and possesses keen analytical ability'] },
  '임': { symbol: ['큰 바다','Great Ocean'], nature: ['수(水)','Water (水)'], desc: ['넓은 마음의 자유인. 생각이 깊고 포용력이 커서 누구든 품어주는 타입','A free spirit with a broad mind. Deep in thought and embracing, the type who accepts everyone'] },
  '계': { symbol: ['이슬/시냇물','Dew/Stream'], nature: ['수(水)','Water (水)'], desc: ['감수성 풍부한 예술가 기질. 직관이 뛰어나고 겉은 잔잔하지만 내면은 깊음','An artistically sensitive temperament. Highly intuitive, calm on the surface but deep within'] },
};
const OHANG_EXCESS = {
  '목': ['추진력 넘치지만 고집이 강할 수 있음','Full of drive but can be stubborn'],
  '화': ['열정적이지만 급하고 감정 기복이 있을 수 있음','Passionate but can be hasty with mood swings'],
  '토': ['안정적이지만 변화를 두려워할 수 있음','Stable but may fear change'],
  '금': ['완벽주의적이지만 비판적일 수 있음','Perfectionistic but can be overly critical'],
  '수': ['지혜롭지만 우유부단할 수 있음','Wise but can be indecisive'],
};
const OHANG_LACK = {
  '목': ['추진력/도전 정신이 부족할 수 있음','May lack drive and adventurous spirit'],
  '화': ['열정/표현력이 약하고 소극적일 수 있음','May lack passion/expressiveness and be passive'],
  '토': ['안정감이 부족하고 불안할 수 있음','May lack stability and feel anxious'],
  '금': ['결단력/판단력이 약할 수 있음','May lack decisiveness and judgment'],
  '수': ['유연성/적응력이 부족할 수 있음','May lack flexibility and adaptability'],
};

async function doAnalyze() {
  const btn = document.getElementById('analyzeBtn');
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');
  btn.disabled = true;
  loading.style.display = 'flex';
  result.style.display = 'none';

  try {
    const sajuInput = {
      birth_date: getBirthDate(),
      birth_time: document.getElementById('birthTime').value,
      gender: document.getElementById('gender').value,
      lang: 'ko',
      yajasi: document.getElementById('yajasiToggle')?.checked || false,
      birth_location: document.getElementById('birthLocation')?.value || 'kr',
    };
    const resp = await fetch(API_BASE + '/api/saju', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(sajuInput),
    });
    if (!resp.ok) { alert(_L('서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.','A server error occurred. Please try again later.')); return; }
    const data = await resp.json();
    if (data.error) { alert(data.error); return; }
    window._sajuInput = augmentShareInput(sajuInput);
    window._sajuResult = data;
    renderResult(data);
  } catch(e) {
    alert(_L('오류: ','Error: ') + e.message);
  } finally {
    btn.disabled = false;
    loading.style.display = 'none';
  }
}

function renderResult(d) {
  document.getElementById('result').style.display = 'grid';
  document.getElementById('ilganText').textContent = d.ilgan;
  const info = ILGAN_INFO[d.ilgan] || {};
  const _i = (arr) => Array.isArray(arr) ? _L(arr[0], arr[1]) : (arr || '');
  document.getElementById('ohangText').innerHTML =
    OHANG_EMOJI[d.ilganOhang] + ' ' + esc(_i(info.nature) || d.ilganOhang) +
    '<div style="font-size:0.85rem;color:#aaa;margin-top:4px">' + esc(_L('자연에 비유하면 ','In nature, like ')) + '<b style="color:#fff">' + esc(_i(info.symbol)) + '</b></div>';
  document.getElementById('ilganDesc').textContent = _i(info.desc);

  const PILLAR_DESC = {
    '년주': _L('조상/부모운, 어린 시절','Ancestors/Parents luck, Childhood'),
    '월주': _L('부모/형제운, 사회성','Parents/Siblings luck, Social life'),
    '일주': _L('나 자신, 배우자운','Self, Spouse luck'),
    '시주': _L('자녀운, 말년운','Children luck, Later years'),
  };
  document.getElementById('pillars').innerHTML = d.pillars.map(p =>
    '<div class="pillar"><div class="gan">'+esc(p.gan)+'</div><div class="ji">'+esc(p.ji)+'</div><div class="name">'+esc(p.name)+'</div></div>'
  ).join('');
  // 기둥 설명 (AI 해석 전 고정 텍스트)
  document.getElementById('pillarDesc').innerHTML = d.pillars.map(p =>
    '<span style="color:#ffd93d">'+esc(p.name)+'</span> '+esc(p.gan+p.ji)+' — '+esc(PILLAR_DESC[p.name]||'')
  ).join(' · ');
  // AI 기둥별 해석은 아래에서 추가
  window._pillarKeys = ['year','month','day','hour'];

  const maxOh = Math.max(...Object.values(d.ohangCount), 1);
  let ohangHtml = Object.entries(d.ohangCount).map(([k,v]) =>
    '<div class="bar-item"><div class="bar-label"><span>'+OHANG_EMOJI[k]+' '+k+'</span><span>'+v+'</span></div>' +
    '<div class="bar-track"><div class="bar-fill" style="width:'+(v/maxOh*100)+'%;background:'+OHANG_COLORS[k]+'"></div></div></div>'
  ).join('');
  // 과다/부족 태그
  const ohangTags = [];
  for (const [k,v] of Object.entries(d.ohangCount)) {
    if (v >= 4) ohangTags.push('<span class="tag tag-warn">' + OHANG_EMOJI[k] + ' ' + k + _L(' 과다: ',' Excess: ') + esc(_L(...(OHANG_EXCESS[k]||['','']))) + '</span>');
    if (v === 0) ohangTags.push('<span class="tag" style="background:rgba(100,100,100,0.3);color:#aaa;border:1px solid rgba(100,100,100,0.4)">' + OHANG_EMOJI[k] + ' ' + k + _L(' 부족: ',' Lacking: ') + esc(_L(...(OHANG_LACK[k]||['','']))) + '</span>');
  }
  if (ohangTags.length) ohangHtml += '<div class="tags" style="margin-top:8px">' + ohangTags.join('') + '</div>';
  document.getElementById('ohangBars').innerHTML = ohangHtml;

  // 대운
  if (d.daeun && d.daeun.length) {
    document.getElementById('daeunSection').style.display = 'block';
    const now = new Date();
    const by = parseInt(document.getElementById('birthYear')?.value || 1995);
    const currentAge = now.getFullYear() - by;

    const daeunReadings = d.ai?.daeun_reading || [];
    // 전역 저장 (팝업에서 사용)
    window._daeunData = d.daeun.map((du, i) => ({ ...du, reading: daeunReadings[i] || '', isCurrent: currentAge >= du.fromAge && currentAge <= du.toAge }));

    document.getElementById('daeunTimeline').innerHTML = d.daeun.map((du, i) => {
      const isCurrent = currentAge >= du.fromAge && currentAge <= du.toAge;
      return '<div onclick="openDaeunModal('+i+', event)" style="min-width:90px;text-align:center;padding:12px 10px;border-radius:12px;flex-shrink:0;cursor:pointer;transition:transform 0.15s;' +
        'background:' + (isCurrent ? 'rgba(233,69,96,0.2);border:2px solid #e94560' : 'rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1)') + '" ' +
        'onmouseover="this.style.transform=\'translateY(-3px)\'" onmouseout="this.style.transform=\'none\'">' +
        '<div style="font-size:0.7rem;color:' + (isCurrent ? '#ff6b6b' : '#888') + ';margin-bottom:4px">' + esc(du.label) + '</div>' +
        '<div style="font-size:1.2rem;font-weight:700;color:#ffd93d">' + esc(du.gan) + '</div>' +
        '<div style="font-size:1.2rem;font-weight:700;color:#81c784">' + esc(du.ji) + '</div>' +
        '<div style="font-size:0.7rem;color:#aaa;margin-top:4px">' + esc(du.ohang) + '/' + esc(du.jiOhang) + '</div>' +
        (isCurrent ? '<div style="font-size:0.6rem;color:#ff6b6b;margin-top:2px;font-weight:700">' + _L('현재','Current') + '</div>' : '') +
        '</div>';
    }).join('');
  }

  if (d.ai) {
    document.getElementById('aiSection').style.display = 'block';

    // 기둥별 AI 해석 추가
    if (d.ai.pillar_reading) {
      const pr = d.ai.pillar_reading;
      const keys = ['year','month','day','hour'];
      const labels = { year: '년주', month: '월주', day: '일주', hour: '시주' };
      let prHtml = '';
      d.pillars.forEach((p, i) => {
        const key = keys[i];
        const reading = pr[key];
        if (reading) {
          prHtml += '<div style="margin-bottom:8px"><span style="color:#ffd93d;font-weight:600;font-size:0.8rem">'+esc(p.name)+' '+esc(p.gan+p.ji)+'</span> ' +
            '<span style="color:#888;font-size:0.72rem">'+esc(PILLAR_DESC[p.name]||'')+'</span>' +
            '<div style="color:#ccc;font-size:0.82rem;margin-top:3px;line-height:1.5">'+esc(reading)+'</div></div>';
        }
      });
      if (prHtml) document.getElementById('pillarDesc').innerHTML = prHtml;
    }

    document.getElementById('aiPersonality').textContent = d.ai.personality || '';
    document.getElementById('aiStrengths').innerHTML = (d.ai.strengths||[]).map(s => '<span class="tag tag-good">'+esc(s)+'</span>').join('');
    document.getElementById('aiCautions').innerHTML = (d.ai.cautions||[]).map(s => '<span class="tag tag-warn">'+esc(s)+'</span>').join('');
    document.getElementById('aiLove').textContent = d.ai.love_style || '';
    document.getElementById('aiCareer').textContent = d.ai.career || '';
    document.getElementById('aiAdvice').textContent = d.ai.advice || '';
  }

  document.getElementById('shareCard').style.display = 'block';
  document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
}

function handleShareKakao() {
  const isEn = (document.documentElement.lang === 'en');
  KarmaShare.shareKakao(
    isEn ? 'My Karma Saju Analysis' : '내 사주팔자 AI 분석 결과',
    isEn ? 'AI-powered Saju reading — check it out' : '생년월일로 본 AI 사주풀이 결과를 확인해보세요'
  );
}

let _openDaeunIndex = -1;

function openDaeunModal(index, event) {
  const du = window._daeunData[index];
  if (!du) return;

  const accordion = document.getElementById('daeunAccordion');
  const content = document.getElementById('daeunAccordionContent');

  // 같은 카드 다시 클릭 → 닫기
  if (_openDaeunIndex === index) {
    accordion.style.maxHeight = '0';
    accordion.style.borderColor = 'transparent';
    _openDaeunIndex = -1;
    return;
  }
  _openDaeunIndex = index;

  content.innerHTML =
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">' +
      '<div>' +
        '<span style="font-size:1.8rem;font-weight:800;color:#ffd93d">' + esc(du.gan) + '</span>' +
        '<span style="font-size:1.8rem;font-weight:800;color:#81c784;margin-left:2px">' + esc(du.ji) + '</span>' +
      '</div>' +
      '<div>' +
        '<div style="font-size:0.9rem;font-weight:600;color:' + (du.isCurrent ? '#ff6b6b' : '#fff') + '">' +
          esc(du.label) + (du.isCurrent ? _L(' (현재 대운)',' (Current Cycle)') : '') +
        '</div>' +
        '<div style="font-size:0.8rem;color:#aaa">' +
          (OHANG_EMOJI[du.ohang]||'') + ' ' + esc(du.ohang) + ' / ' + (OHANG_EMOJI[du.jiOhang]||'') + ' ' + esc(du.jiOhang) +
        '</div>' +
      '</div>' +
    '</div>' +
    (du.isCurrent ? '<div style="background:rgba(233,69,96,0.15);border:1px solid rgba(233,69,96,0.3);border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:0.8rem;color:#ff6b6b">' + esc(_L('현재 이 대운의 영향 아래에 있습니다','You are currently under the influence of this major fortune cycle')) + '</div>' : '') +
    '<p style="line-height:1.7;color:#e0e0e0;font-size:0.88rem">' + esc(du.reading || _L('해석 데이터가 없습니다.','No reading data available.')) + '</p>';

  // 콘텐츠 높이 측정 후 max-height 적용 (부드러운 전환)
  accordion.style.maxHeight = '0';
  accordion.style.borderColor = 'rgba(255,255,255,0.1)';
  requestAnimationFrame(() => {
    accordion.style.maxHeight = content.scrollHeight + 60 + 'px';
  });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

</script>
<script>
(function() {
  const saved = localStorage.getItem('karma_lang');
  if (saved && saved !== 'ko') { changeLang(saved); return; }
})();

function _restoreSajuInput(input) { restoreShareInput(input); }

KarmaShare.init({
  type: 'saju',
  lang: (document.documentElement.lang === 'en' ? 'en' : 'ko'),
  pageBase: '/saju',
  getPayload: () => ({ input: window._sajuInput || null, result: window._sajuResult || null }),
  onLoadShared: ({ input, result }) => {
    window._sajuInput = input;
    window._sajuResult = result;
    _restoreSajuInput(input);
    renderResult(result);
  },
});
</script>
