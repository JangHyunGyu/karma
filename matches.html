<body>
<div class="container wide">
  <div class="nav">
    <span class="nav-title">💬 매칭 & 쪽지함</span>
    <div style="display:flex;gap:10px">
      <button class="btn btn-small" onclick="location.href='/discover.html'">🔍 탐색</button>
      <button class="btn btn-small btn-secondary" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div id="loading" style="position:fixed;inset:0;background:rgba(10,10,30,0.92);z-index:999;display:flex;justify-content:center;align-items:center;flex-direction:column">
    <div class="spinner"></div>
    <p style="color:#c9a044;font-size:1rem;font-weight:600;margin-top:16px">매칭 목록을 불러오고 있습니다</p>
    <p style="color:#888;font-size:0.8rem;margin-top:8px">잠시만 기다려주세요...</p>
  </div>

  <div id="content" style="display:none">
    <div id="matchList"></div>
    <div id="empty" style="display:none" class="empty-state">
      <p>아직 매칭된 사람이 없습니다</p>
      <p style="font-size:0.8rem;color:#555;margin-top:8px">탐색 페이지에서 마음에 드는 사람에게 💕 좋아요를 보내보세요</p>
      <button class="btn" style="margin-top:16px;width:auto;padding:10px 24px" onclick="location.href='/discover.html'">탐색하러 가기</button>
    </div>
  </div>
</div>

<!-- 쪽지 모달 -->
<div id="chatModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;display:none">
  <div style="max-width:480px;margin:0 auto;height:100%;display:flex;flex-direction:column;padding:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0">
      <span id="chatTitle" style="font-weight:700;color:#ff6b6b"></span>
      <button class="btn btn-small btn-secondary" onclick="closeChat()">닫기</button>
    </div>
    <div id="chatMessages" style="flex:1;overflow-y:auto;padding:10px 0"></div>
    <div style="display:flex;gap:8px;padding:10px 0">
      <input type="text" id="chatInput" placeholder="쪽지를 입력하세요..." style="flex:1" onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="btn btn-small" onclick="sendMsg()">전송</button>
    </div>
  </div>
</div>

<script src="/js/components.js?v=3"></script>
<script>
const userId = sessionStorage.getItem('user_id');
if (!userId) location.href = '/login.html';

let currentChatUser = null;

async function loadMatches() {
  try {
    const resp = await fetch(API_BASE + '/api/matches/' + encodeURIComponent(userId));
    const data = await resp.json();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

    if (!data.matches.length) {
      document.getElementById('empty').style.display = 'block';
      return;
    }

    const OHANG_EMOJI = {'목':'🌿','화':'🔥','토':'🏔','금':'⚔','수':'🌊'};

    document.getElementById('matchList').innerHTML = data.matches.map(m => `
      <div class="match-card fade-in" onclick="openChat('${esc(m.user_id)}','${esc(m.nickname)}')">
        <div class="match-info">
          <div class="name">${esc(m.nickname)} <span style="font-size:0.75rem;color:#888">${OHANG_EMOJI[m.ohang]||''} ${esc(m.ohang||'')}</span></div>
          <div class="meta">${m.last_message ? esc(m.last_message) : '아직 대화를 시작하지 않았어요'}</div>
        </div>
        ${m.unread_count > 0 ? '<span style="background:#e94560;color:#fff;border-radius:50%;min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700">'+m.unread_count+'</span>' : ''}
      </div>
    `).join('');
  } catch(e) {
    alert('오류: ' + e.message);
  }
}

async function openChat(otherId, nickname) {
  currentChatUser = otherId;
  document.getElementById('chatModal').style.display = 'block';
  document.getElementById('chatTitle').textContent = nickname + '님과의 쪽지';
  document.getElementById('chatInput').focus();

  // 읽음 처리
  fetch(API_BASE + '/api/messages/' + otherId + '/read', {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ user_id: userId }),
  });

  // 메시지 로드
  const resp = await fetch(API_BASE + '/api/messages/' + userId + '/' + otherId);
  const data = await resp.json();

  const container = document.getElementById('chatMessages');
  container.innerHTML = data.messages.map(m => {
    const isMine = m.sender_id === userId;
    return '<div style="display:flex;justify-content:'+(isMine?'flex-end':'flex-start')+';margin-bottom:8px">' +
      '<div style="max-width:70%;padding:10px 14px;border-radius:16px;font-size:0.9rem;' +
      (isMine ? 'background:#e94560;color:#fff' : 'background:rgba(255,255,255,0.1);color:#e0e0e0') + '">' +
      esc(m.content) +
      '<div style="font-size:0.65rem;color:'+(isMine?'rgba(255,255,255,0.6)':'#666')+';margin-top:4px">' + formatTime(m.created_at) + '</div>' +
      '</div></div>';
  }).join('');

  container.scrollTop = container.scrollHeight;
}

function closeChat() {
  document.getElementById('chatModal').style.display = 'none';
  currentChatUser = null;
  loadMatches(); // 목록 갱신
}

async function sendMsg() {
  const input = document.getElementById('chatInput');
  const content = input.value.trim();
  if (!content || !currentChatUser) return;

  input.value = '';
  try {
    await fetch(API_BASE + '/api/messages/' + currentChatUser, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ user_id: userId, content }),
    });
    openChat(currentChatUser, document.getElementById('chatTitle').textContent.replace('님과의 쪽지',''));
  } catch(e) {
    alert('전송 실패: ' + e.message);
  }
}

function formatTime(dt) {
  if (!dt) return '';
  const d = new Date(dt + 'Z');
  const now = new Date();
  const diff = (now - d) / 60000;
  if (diff < 1) return '방금';
  if (diff < 60) return Math.floor(diff) + '분 전';
  if (diff < 1440) return Math.floor(diff/60) + '시간 전';
  return d.toLocaleDateString('ko');
}

function doLogout() { sessionStorage.clear(); location.href = '/'; }
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

loadMatches();
</script>
</body>
</html>
