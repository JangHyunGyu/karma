<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karma - 관상 분석</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/style.css?v=3">
<style>
.upload-area {
  border: 2px dashed rgba(201,160,68,0.25);
  border-radius: 16px;
  padding: 48px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  margin-bottom: 20px;
  position: relative;
  background: radial-gradient(circle at 50% 40%, rgba(201,160,68,0.06) 0%, transparent 70%);
}
.upload-area:hover, .upload-area.dragover {
  border-color: #c9a044;
  background: radial-gradient(circle at 50% 40%, rgba(201,160,68,0.12) 0%, transparent 70%);
  box-shadow: 0 0 30px rgba(201,160,68,0.08);
}
.upload-area.has-image {
  padding: 0;
  border-style: solid;
  border-color: rgba(201,160,68,0.3);
  background: none;
}
.upload-area .upload-visual {
  width: 80px; height: 80px;
  margin: 0 auto 16px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(201,160,68,0.15), rgba(123,94,167,0.15));
  display: flex; align-items: center; justify-content: center;
  font-size: 2.4rem;
  box-shadow: 0 4px 20px rgba(201,160,68,0.1);
}
.upload-area .upload-text {
  color: #c9a044;
  font-size: 0.95rem;
  font-weight: 600;
  margin-bottom: 6px;
}
.upload-area .upload-hint {
  color: #666;
  font-size: 0.78rem;
  line-height: 1.5;
}
.upload-area img {
  width: 100%;
  max-height: 320px;
  object-fit: cover;
  display: block;
  border-radius: 14px;
}
.upload-area input[type="file"] { display: none; }

.options-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}
.opt-group label {
  font-size: 0.72rem;
  color: #888;
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.opt-group select {
  width: 100%;
  margin-bottom: 0;
}

.result-section { margin-top: 24px; }
.score-ring {
  width: 120px; height: 120px;
  margin: 0 auto 16px;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.score-ring svg { position: absolute; inset: 0; transform: rotate(-90deg); }
.score-ring .score-num { font-size: 2.8rem; font-weight: 900; color: #c9a044; z-index: 1; }
.score-ring .score-grade {
  position: absolute;
  bottom: -4px; right: -4px;
  z-index: 2;
}
.score-header { text-align: center; padding: 28px 20px; margin-bottom: 16px; }
.score-header .summary-text { color: #aaa; font-size: 0.88rem; margin-top: 12px; line-height: 1.5; }

.cat-item {
  padding: 16px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.cat-item:last-child { border-bottom: none; }
.cat-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.cat-name { font-weight: 700; color: #e8e0d0; font-size: 0.92rem; }
.cat-score { color: #c9a044; font-weight: 700; font-size: 1rem; }
.cat-desc { font-size: 0.82rem; color: #999; line-height: 1.6; margin-top: 8px; }

.fortune-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
.fort-card {
  padding: 16px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  transition: background 0.2s;
}
.fort-card:hover { background: rgba(255,255,255,0.06); }
.fort-icon { font-size: 1.4rem; margin-bottom: 6px; }
.fort-label { font-size: 0.7rem; color: #c9a044; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 6px; }
.fort-text { font-size: 0.8rem; color: #bbb; line-height: 1.5; }

.celeb-box {
  margin-top: 14px;
  padding: 14px 18px;
  background: linear-gradient(135deg, rgba(123,94,167,0.12), rgba(201,160,68,0.08));
  border: 1px solid rgba(123,94,167,0.2);
  border-radius: 12px;
  font-size: 0.85rem;
  color: #b39ddb;
  display: flex; align-items: center; gap: 8px;
}
</style>
<script src="/js/browser-check.js"></script>
</head>
<body class="bg-saju">
<div class="header-bg"></div>
<nav class="home-nav"><a href="/">🏠 메인</a></nav>
<div class="lang-select-wrap"><select class="lang-select" data-combo-init="1" id="langSelect" onchange="changeLang(this.value)"><option value="ko">🌐 한국어</option><option value="en">🌐 English</option></select></div>
<div class="container">
  <h1>🧑 관상 분석</h1>
  <p class="subtitle">분석 엔진이 얼굴의 관상을 분석합니다</p>

  <div class="card">
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <div class="upload-visual">🧑</div>
      <div class="upload-text">얼굴 사진 업로드</div>
      <div class="upload-hint">탭하여 사진을 선택하세요</div>
      <input type="file" id="fileInput" accept="image/*">
    </div>
    <div style="font-size:0.72rem;color:#888;line-height:1.6;padding:0 4px;margin-bottom:16px">
      <div style="color:#c9a044;font-weight:600;margin-bottom:4px">📌 주의사항</div>
      • 정면 얼굴이 잘 보이는 사진을 사용하세요<br>
      • 모자, 선글라스, 마스크 없이 촬영해주세요<br>
      • 조명이 밝고 그림자가 적을수록 정확합니다<br>
      • 1인 사진만 가능합니다 (단체 사진 불가)<br>
      <span style="color:#e07070">⚠ 보정/필터 적용된 사진은 결과가 부정확합니다</span>
    </div>
    <div class="options-row">
      <div class="opt-group">
        <label>성별</label>
        <select id="gender" onchange="checkReady()">
          <option value="" disabled selected>선택하세요</option>
          <option value="남성">남성</option>
          <option value="여성">여성</option>
        </select>
      </div>
      <div class="opt-group">
        <label>나이대</label>
        <select id="age" onchange="checkReady()">
          <option value="" disabled selected>선택하세요</option>
          <option value="10대">10대</option>
          <option value="20대">20대</option>
          <option value="30대">30대</option>
          <option value="40대">40대</option>
          <option value="50대">50대</option>
          <option value="60대 이상">60대 이상</option>
        </select>
      </div>
    </div>
    <button class="btn" id="analyzeBtn" disabled>관상 분석하기</button>
  </div>

  <div id="loading" style="display:none;position:fixed;inset:0;background:rgba(10,10,30,0.92);z-index:999;justify-content:center;align-items:center;flex-direction:column">
    <div class="spinner"></div>
    <p style="color:#c9a044;font-size:1rem;font-weight:600;margin-top:16px">관상을 분석하고 있습니다</p>
    <p style="color:#888;font-size:0.8rem;margin-top:8px">분석 엔진이 얼굴 특징을 읽고 있어요...</p>
  </div>

  <div class="error" id="error"></div>

  <div class="result-section" id="result" style="display:none">
    <div class="card score-header">
      <div class="score-ring">
        <svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="52" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8"/><circle id="scoreCircle" cx="60" cy="60" r="52" fill="none" stroke="#c9a044" stroke-width="8" stroke-linecap="round" stroke-dasharray="327" stroke-dashoffset="327"/></svg>
        <span class="score-num" id="totalScore"></span>
        <span class="score-grade" id="totalGrade"></span>
      </div>
      <div class="summary-text" id="summary"></div>
    </div>

    <div class="card" id="categories" style="padding:22px"></div>

    <div class="card">
      <h2>🔮 운세 풀이</h2>
      <div class="fortune-grid" id="fortune"></div>
    </div>

    <div class="card">
      <h2>💡 조언</h2>
      <p id="advice" style="font-size:0.88rem;color:#bbb;line-height:1.7"></p>
      <div class="celeb-box" id="celeb" style="display:none"></div>
    </div>

    <button class="btn btn-secondary" onclick="resetForm()" style="margin-top:10px">다시 분석하기</button>
  </div>
</div>

<script>
const API = 'https://karma-api.yama5993.workers.dev';
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const analyzeBtn = document.getElementById('analyzeBtn');
let imageData = null, imageMime = null;

function checkReady() {
  analyzeBtn.disabled = !(imageData && document.getElementById('gender').value && document.getElementById('age').value);
}

uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  if (!file.type.startsWith('image/')) return;
  if (file.size > 15 * 1024 * 1024) {
    alert('이미지 크기가 15MB를 초과합니다. 더 작은 사진을 사용해주세요.');
    return;
  }
  imageMime = file.type;
  const reader = new FileReader();
  reader.onload = e => {
    imageData = e.target.result.split(',')[1];
    uploadArea.classList.add('has-image');
    uploadArea.innerHTML = `<img src="${e.target.result}" alt="uploaded"><input type="file" id="fileInput" accept="image/*" style="display:none">`;
    document.getElementById('fileInput').addEventListener('change', e2 => { if (e2.target.files[0]) handleFile(e2.target.files[0]); });
    checkReady();
  };
  reader.readAsDataURL(file);
}

analyzeBtn.addEventListener('click', async () => {
  if (!imageData) return;
  analyzeBtn.disabled = true;
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('result').style.display = 'none';
  document.getElementById('error').style.display = 'none';

  try {
    const resp = await fetch(`${API}/api/face-reading`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        image: imageData, mimeType: imageMime,
        gender: document.getElementById('gender').value,
        age: document.getElementById('age').value,
      }),
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    renderResult(data);
  } catch (e) {
    const err = document.getElementById('error');
    err.textContent = e.message || '분석 중 오류가 발생했습니다';
    err.style.display = 'block';
  } finally {
    document.getElementById('loading').style.display = 'none';
    analyzeBtn.disabled = false;
  }
});

function renderResult(d) {
  const score = d.overall_score || 0;
  document.getElementById('totalScore').textContent = score;
  const grade = d.overall_grade || getGrade(score);
  document.getElementById('totalGrade').innerHTML = `<span class="grade grade-${grade}">${grade}</span>`;
  document.getElementById('summary').textContent = d.summary || '';

  // 원형 프로그레스
  const offset = 327 - (327 * score / 100);
  document.getElementById('scoreCircle').style.strokeDashoffset = offset;

  const cats = document.getElementById('categories');
  cats.innerHTML = '<h2>📋 상세 분석</h2>' + (d.categories || []).map(c => `
    <div class="cat-item">
      <div class="cat-top">
        <span class="cat-name">${c.name}</span>
        <span class="cat-score">${c.score}점</span>
      </div>
      <div class="bar-item"><div class="bar-track"><div class="bar-fill" style="width:${c.score}%;background:linear-gradient(90deg,#8b5e2f,#c9a044)"></div></div></div>
      <div class="cat-desc">${c.desc}</div>
    </div>
  `).join('');

  const fort = d.fortune || {};
  document.getElementById('fortune').innerHTML = [
    ['💰', '재물운', fort.wealth],
    ['💼', '직업운', fort.career],
    ['❤️', '연애운', fort.love],
    ['🏥', '건강운', fort.health],
  ].map(([icon, label, text]) => `
    <div class="fort-card">
      <div class="fort-icon">${icon}</div>
      <div class="fort-label">${label}</div>
      <div class="fort-text">${text || '-'}</div>
    </div>
  `).join('');

  document.getElementById('advice').textContent = d.advice || '';
  const celeb = document.getElementById('celeb');
  if (d.celebrity_resemblance) {
    celeb.innerHTML = '⭐ <span>닮은 유명인: <b>' + d.celebrity_resemblance + '</b></span>';
    celeb.style.display = 'flex';
  } else {
    celeb.style.display = 'none';
  }

  document.getElementById('result').style.display = '';
  document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
}

function getGrade(s) {
  if (s >= 90) return 'S'; if (s >= 75) return 'A'; if (s >= 60) return 'B'; if (s >= 40) return 'C'; return 'D';
}

function resetForm() {
  imageData = null; imageMime = null;
  uploadArea.classList.remove('has-image');
  uploadArea.innerHTML = '<div class="upload-visual">🧑</div><div class="upload-text">얼굴 사진 업로드</div><div class="upload-hint">정면 사진이 가장 정확합니다<br>탭하여 사진을 선택하세요</div><input type="file" id="fileInput" accept="image/*">';
  document.getElementById('fileInput').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
  analyzeBtn.disabled = true;
  document.getElementById('result').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
<script>function changeLang(l){document.documentElement.lang=l;localStorage.setItem("karma_lang",l)}(function(){var s=localStorage.getItem("karma_lang");if(s){var e=document.getElementById("langSelect");if(e)e.value=s;document.documentElement.lang=s}})()</script>
</body>
</html>
