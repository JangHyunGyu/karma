<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karma - 궁합 분석</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/style.css">
</head>
<body class="bg-compat">
<nav class="home-nav"><a href="/">🏠 메인</a></nav>
<div class="lang-select-wrap"><select class="lang-select" id="langSelect" onchange="changeLang(this.value)"><option value="ko">🌐 한국어</option><option value="en">🌐 English</option></select></div>
<div class="container wide">
  <h1>💕 궁합 분석</h1>
  <p class="subtitle">두 사람의 사주 오행 궁합을 분석합니다</p>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="card">
      <h2>Person A</h2>
      <label>생년월일</label>
      <div class="date-selects" id="dateSelectsA"></div>
      <label>성별</label>
      <select id="genderA">
        <option value="male">남성</option>
        <option value="female">여성</option>
      </select>
      <label>태어난 시</label>
      <select id="timeA">
        <option value="">모름</option>
        <option value="00:00">자시 (23~01)</option>
        <option value="01:00">축시 (01~03)</option>
        <option value="03:00">인시 (03~05)</option>
        <option value="05:00">묘시 (05~07)</option>
        <option value="07:00">진시 (07~09)</option>
        <option value="09:00">사시 (09~11)</option>
        <option value="11:00">오시 (11~13)</option>
        <option value="13:00">미시 (13~15)</option>
        <option value="15:00">신시 (15~17)</option>
        <option value="17:00">유시 (17~19)</option>
        <option value="19:00">술시 (19~21)</option>
        <option value="21:00">해시 (21~23)</option>
      </select>
    </div>
    <div class="card">
      <h2>Person B</h2>
      <label>생년월일</label>
      <div class="date-selects" id="dateSelectsB"></div>
      <label>성별</label>
      <select id="genderB">
        <option value="female">여성</option>
        <option value="male">남성</option>
      </select>
      <label>태어난 시</label>
      <select id="timeB">
        <option value="">모름</option>
        <option value="00:00">자시 (23~01)</option>
        <option value="01:00">축시 (01~03)</option>
        <option value="03:00">인시 (03~05)</option>
        <option value="05:00">묘시 (05~07)</option>
        <option value="07:00">진시 (07~09)</option>
        <option value="09:00">사시 (09~11)</option>
        <option value="11:00">오시 (11~13)</option>
        <option value="13:00">미시 (13~15)</option>
        <option value="15:00">신시 (15~17)</option>
        <option value="17:00">유시 (17~19)</option>
        <option value="19:00">술시 (19~21)</option>
        <option value="21:00">해시 (21~23)</option>
      </select>
    </div>
  </div>

  <button class="btn" id="compatBtn" onclick="doCompat()">궁합 분석하기</button>

  <div id="loading" style="display:none" class="loading">
    <div class="spinner"></div>
    <p>궁합을 분석하고 있습니다...</p>
  </div>

  <div id="result" style="display:none" class="fade-in">
    <div class="card" style="text-align:center">
      <p style="font-size:0.85rem;color:#aaa;margin-bottom:8px">사주 오행 궁합</p>
      <div style="margin:16px 0">
        <span id="scoreNum" style="font-size:4rem;font-weight:800;background:linear-gradient(135deg,#ffd93d,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent"></span>
        <span class="grade" id="gradeTag" style="margin-left:10px;font-size:1.3rem"></span>
      </div>
    </div>

    <div class="card">
      <h2>사주 비교</h2>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div>
          <p style="font-size:0.82rem;color:#ffd93d;margin-bottom:6px" id="labelA"></p>
          <div class="pillars" id="pillarsA"></div>
        </div>
        <div>
          <p style="font-size:0.82rem;color:#ffd93d;margin-bottom:6px" id="labelB"></p>
          <div class="pillars" id="pillarsB"></div>
        </div>
      </div>
    </div>

    <div class="card" id="relationsCard">
      <h2>오행 관계</h2>
      <div id="relationsContent"></div>
    </div>

    <div id="aiSection" style="display:none">
      <div class="card">
        <h2>AI 궁합 분석</h2>
        <p id="aiSummary" style="font-size:1rem;font-weight:600;margin-bottom:12px"></p>
        <div style="margin-bottom:8px">
          <span style="font-size:0.8rem;color:#81c784">강점</span>
          <div class="tags" id="aiStrengths"></div>
        </div>
        <div style="margin-bottom:8px">
          <span style="font-size:0.8rem;color:#ffb74d">주의</span>
          <div class="tags" id="aiCautions"></div>
        </div>
        <div class="saju-box" id="aiReading"></div>
        <div class="advice-box" id="aiAdvice" style="margin-top:8px"></div>
      </div>
    </div>

  </div>

</div>

<script src="/js/components.js"></script>
<script>
// 궁합용 날짜 셀렉트 (A/B 별도)
function createDateSelectsFor(containerId, prefix, defY, defM, defD) {
  const c = document.getElementById(containerId);
  if (!c) return;
  const thisYear = new Date().getFullYear();
  let html = '<div class="date-selects">';
  // 년
  html += '<div class="date-select-group"><label>년</label><select id="'+prefix+'Year" onchange="updateDaysFor(\''+prefix+'\')">';
  for (let y = thisYear - 5; y >= thisYear - 100; y--) html += '<option value="'+y+'" '+(y==defY?'selected':'')+'>'+y+'</option>';
  html += '</select></div>';
  // 월
  html += '<div class="date-select-group"><label>월</label><select id="'+prefix+'Month" onchange="updateDaysFor(\''+prefix+'\')">';
  for (let m = 1; m <= 12; m++) html += '<option value="'+m+'" '+(m==defM?'selected':'')+'>'+m+'</option>';
  html += '</select></div>';
  // 일
  html += '<div class="date-select-group"><label>일</label><select id="'+prefix+'Day">';
  const days = new Date(defY, defM, 0).getDate();
  for (let d = 1; d <= days; d++) html += '<option value="'+d+'" '+(d==defD?'selected':'')+'>'+d+'</option>';
  html += '</select></div>';
  html += '</div>';
  c.innerHTML = html;
  // 커스텀 콤보로 변환
  c.querySelectorAll('select').forEach(s => createCombo(s));
}
function updateDaysFor(prefix) {
  const y = parseInt(document.getElementById(prefix+'Year')?.value || 2000);
  const m = parseInt(document.getElementById(prefix+'Month')?.value || 1);
  const sel = document.getElementById(prefix+'Day');
  if (!sel) return;
  const cur = parseInt(sel.value) || 1;
  const days = new Date(y, m, 0).getDate();
  let html = '';
  for (let d = 1; d <= days; d++) html += '<option value="'+d+'" '+(d===Math.min(cur,days)?'selected':'')+'>'+d+'</option>';
  sel.innerHTML = html;
}
function getDateFor(prefix) {
  const y = document.getElementById(prefix+'Year')?.value;
  const m = document.getElementById(prefix+'Month')?.value;
  const d = document.getElementById(prefix+'Day')?.value;
  if (!y || !m || !d) return '';
  return y + '-' + String(m).padStart(2,'0') + '-' + String(d).padStart(2,'0');
}

createDateSelectsFor('dateSelectsA', 'a', 1995, 3, 20);
createDateSelectsFor('dateSelectsB', 'b', 1998, 7, 11);

async function doCompat() {
  const btn = document.getElementById('compatBtn');
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');
  btn.disabled = true;
  loading.style.display = 'block';
  result.style.display = 'none';

  try {
    const resp = await fetch(API_BASE + '/api/compat-quick', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        personA: { birth_date: getDateFor('a'), birth_time: document.getElementById('timeA').value, gender: document.getElementById('genderA').value },
        personB: { birth_date: getDateFor('b'), birth_time: document.getElementById('timeB').value, gender: document.getElementById('genderB').value },
      }),
    });
    const data = await resp.json();
    if (data.error) { alert(data.error); return; }
    renderResult(data);
  } catch(e) {
    alert('오류: ' + e.message);
  } finally {
    btn.disabled = false;
    loading.style.display = 'none';
  }
}

function renderResult(d) {
  document.getElementById('result').style.display = 'block';
  document.getElementById('scoreNum').textContent = d.score;
  const gt = document.getElementById('gradeTag');
  gt.textContent = d.grade;
  gt.className = 'grade grade-' + d.grade;

  document.getElementById('labelA').textContent = 'A: ' + d.saju_a.ilgan + ' ' + d.saju_a.ilganOhang + '(' + ohangEmoji(d.saju_a.ilganOhang) + ')';
  document.getElementById('labelB').textContent = 'B: ' + d.saju_b.ilgan + ' ' + d.saju_b.ilganOhang + '(' + ohangEmoji(d.saju_b.ilganOhang) + ')';

  document.getElementById('pillarsA').innerHTML = renderPillars(d.saju_a.pillars);
  document.getElementById('pillarsB').innerHTML = renderPillars(d.saju_b.pillars);

  // 오행 관계
  let relHtml = '';
  if (d.relations.sangsaeng.length) relHtml += d.relations.sangsaeng.map(r => '<div class="tag tag-good">상생: ' + esc(r) + '</div>').join('');
  if (d.relations.sanggeuk.length) relHtml += d.relations.sanggeuk.map(r => '<div class="tag tag-warn">상극: ' + esc(r) + '</div>').join('');
  if (d.relations.same) relHtml += '<div class="tag tag-good">동일 오행 (비화)</div>';
  if (!relHtml) relHtml = '<p style="color:#888;font-size:0.85rem">특별한 오행 관계 없음</p>';
  document.getElementById('relationsContent').innerHTML = '<div class="tags">' + relHtml + '</div>';

  // AI
  if (d.ai) {
    document.getElementById('aiSection').style.display = 'block';
    document.getElementById('aiSummary').textContent = d.ai.summary || '';
    document.getElementById('aiStrengths').innerHTML = (d.ai.strengths||[]).map(s => '<span class="tag tag-good">'+esc(s)+'</span>').join('');
    document.getElementById('aiCautions').innerHTML = (d.ai.cautions||[]).map(s => '<span class="tag tag-warn">'+esc(s)+'</span>').join('');
    document.getElementById('aiReading').textContent = '🔮 ' + (d.ai.saju_reading || '');
    document.getElementById('aiAdvice').textContent = '💡 ' + (d.ai.advice || '');
  }

  result.scrollIntoView({ behavior: 'smooth' });
}

function renderPillars(pillars) {
  return pillars.map(p =>
    '<div class="pillar"><div class="gan">'+esc(p.gan)+'</div><div class="ji">'+esc(p.ji)+'</div><div class="name">'+esc(p.name)+'</div></div>'
  ).join('');
}

function ohangEmoji(oh) { return {'목':'🌿','화':'🔥','토':'🏔','금':'⚔','수':'🌊'}[oh] || ''; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
<script>function changeLang(l){document.documentElement.lang=l;localStorage.setItem("karma_lang",l)}(function(){var s=localStorage.getItem("karma_lang");if(s){var e=document.getElementById("langSelect");if(e)e.value=s;document.documentElement.lang=s}})()</script>
</body>
</html>
