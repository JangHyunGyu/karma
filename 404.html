<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, follow">
<title>Page Not Found | Karma</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/style.css?v=9">
<style>
  .not-found { max-width: 520px; min-height: 100vh; display: flex; align-items: center; }
  .not-found .card { width: 100%; text-align: center; padding: 36px 24px; }
  .not-found-code { color: #c9a044; font-size: clamp(3rem, 16vw, 6rem); line-height: 1; margin-bottom: 16px; }
  .not-found-actions { display: grid; gap: 10px; margin-top: 24px; }
  .not-found-actions .btn { display: block; text-decoration: none; }
</style>
</head>
<body class="bg-main">
<div class="header-bg"></div>
<main class="container not-found">
  <section class="card">
    <div class="not-found-code">404</div>
    <h1>Page not found</h1>
    <p class="subtitle">요청하신 페이지를 찾을 수 없습니다.</p>
    <div class="not-found-actions">
      <a class="btn" href="/index-en">Go to English home</a>
      <a class="btn btn-secondary" href="/">한국어 홈으로</a>
    </div>
  </section>
</main>
</body>
</html>
