<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karma - 사주 & 궁합 매칭</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/style.css">
</head>
<body class="bg-main">
<a href="https://archerlab.dev" target="_blank" rel="noopener noreferrer" class="archerlab-link">🏹 ArcherLab</a>
<nav class="top-nav">
  <button class="lang-btn" onclick="toggleLang()" title="Switch language">
    <span class="lang-icon">🌐</span>
    <span class="lang-label" id="langLabel">EN</span>
  </button>
</nav>
<div class="container">
  <h1>Karma</h1>
  <p class="subtitle" data-ko="사주 & 궁합 기반 매칭 플랫폼" data-en="Saju & Compatibility Matching Platform">사주 & 궁합 기반 매칭 플랫폼</p>

  <div class="menu-grid">
    <div class="menu-card" onclick="location.href='/saju.html'">
      <div class="menu-icon">🔮</div>
      <div class="menu-title" data-ko="사주" data-en="Saju">사주</div>
      <div class="menu-desc" data-ko="내 사주팔자 분석" data-en="Four Pillars Analysis">내 사주팔자 분석</div>
    </div>
    <div class="menu-card" onclick="location.href='/fortune.html'">
      <div class="menu-icon">🌟</div>
      <div class="menu-title" data-ko="운세" data-en="Fortune">운세</div>
      <div class="menu-desc" data-ko="과거~미래 10년 운세" data-en="10-Year Fortune">과거~미래 10년 운세</div>
    </div>
    <div class="menu-card" onclick="location.href='/compat.html'">
      <div class="menu-icon">💕</div>
      <div class="menu-title" data-ko="궁합" data-en="Compatibility">궁합</div>
      <div class="menu-desc" data-ko="두 사람의 사주 궁합" data-en="Couple Compatibility">두 사람의 사주 궁합</div>
    </div>
    <div class="menu-card" onclick="location.href='/login.html'">
      <div class="menu-icon">👥</div>
      <div class="menu-title" data-ko="매칭" data-en="Matching">매칭</div>
      <div class="menu-desc" data-ko="나와 맞는 사람 찾기" data-en="Find Your Match">나와 맞는 사람 찾기</div>
      <span class="menu-badge" data-ko="회원전용" data-en="Members">회원전용</span>
    </div>
  </div>

</div>
<script>
function toggleLang() {
  const html = document.documentElement;
  const cur = html.lang === 'ko' ? 'en' : 'ko';
  html.lang = cur;
  document.getElementById('langLabel').textContent = cur === 'ko' ? 'EN' : '한';
  document.querySelectorAll('[data-ko][data-en]').forEach(el => {
    el.textContent = el.dataset[cur];
  });
  localStorage.setItem('karma_lang', cur);
}
(function() {
  const saved = localStorage.getItem('karma_lang');
  if (saved && saved !== 'ko') toggleLang();
})();
</script>
</body>
</html>
