<body class="bg-saju">
<div class="header-bg"></div>

<div class="lang-select-wrap"><select class="lang-select" data-combo-init="1" id="langSelect" onchange="changeLang(this.value)"><option value="ko">🌐 한국어</option><option value="en">🌐 English</option></select></div>
<div class="container">
  <h1 data-ko="🤚 수상 (손금) 분석" data-en="🤚 Palm Reading">🤚 수상 (손금) 분석</h1>
  <p class="subtitle" data-ko="분석 엔진이 손금을 분석합니다" data-en="AI analyzes your palm lines">분석 엔진이 손금을 분석합니다</p>

  <div class="card">
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <div class="upload-visual">🤚</div>
      <div class="upload-text" data-ko="손바닥 사진 업로드" data-en="Upload Palm Photo">손바닥 사진 업로드</div>
      <div class="upload-hint" data-ko="탭하여 사진을 선택하세요" data-en="Tap to select a photo">탭하여 사진을 선택하세요</div>
      <input type="file" id="fileInput" accept="image/*">
    </div>
    <div style="font-size:0.72rem;color:#888;line-height:1.6;padding:0 4px;margin-bottom:16px">
      <div style="color:#c9a044;font-weight:600;margin-bottom:4px" data-ko="📌 주의사항" data-en="📌 Caution">📌 주의사항</div>
      <span data-ko="• 손바닥을 활짝 펴서 촬영해주세요" data-en="• Spread your palm wide open for the photo">• 손바닥을 활짝 펴서 촬영해주세요</span><br>
      <span data-ko="• 손금이 선명하게 보이도록 밝은 곳에서 촬영" data-en="• Take the photo in a bright area so palm lines are clearly visible">• 손금이 선명하게 보이도록 밝은 곳에서 촬영</span><br>
      <span data-ko="• 손바닥만 나오도록 가까이 촬영해주세요" data-en="• Take a close-up photo showing only the palm">• 손바닥만 나오도록 가까이 촬영해주세요</span><br>
      <span data-ko="• 주 사용 손 = 후천적 노력, 반대 손 = 선천적 운명" data-en="• Dominant hand = acquired effort, Non-dominant = innate destiny">• 주 사용 손 = 후천적 노력, 반대 손 = 선천적 운명</span><br>
      <span data-ko="• 손가락까지 나오면 더 정확한 분석이 가능합니다" data-en="• Including fingers allows for more accurate analysis">• 손가락까지 나오면 더 정확한 분석이 가능합니다</span>
    </div>
    <div class="options-row">
      <div class="opt-group">
        <label data-ko="주 사용 손" data-en="Dominant Hand">주 사용 손</label>
        <select id="dominant" onchange="updateHandLabels()">
          <option value="right" data-ko="오른손잡이" data-en="Right-handed">오른손잡이</option>
          <option value="left" data-ko="왼손잡이" data-en="Left-handed">왼손잡이</option>
        </select>
      </div>
      <div class="opt-group">
        <label data-ko="촬영한 손" data-en="Which Hand">촬영한 손</label>
        <select id="hand">
          <option value="왼손" id="handLeft">왼손 (선천운)</option>
          <option value="오른손" id="handRight">오른손 (후천운)</option>
        </select>
      </div>
    </div>
    <div class="options-row">
      <div class="opt-group">
        <label data-ko="성별" data-en="Gender">성별</label>
        <select id="gender" onchange="checkReady()">
          <option value="" disabled selected data-ko="선택하세요" data-en="Select">선택하세요</option>
          <option value="남성" data-ko="남성" data-en="Male">남성</option>
          <option value="여성" data-ko="여성" data-en="Female">여성</option>
        </select>
      </div>
    </div>
    <button class="btn" id="analyzeBtn" disabled data-ko="손금 분석하기" data-en="Analyze Palm">손금 분석하기</button>
  </div>

  <div id="loading" style="display:none;position:fixed;inset:0;background:rgba(10,10,30,0.92);z-index:999;justify-content:center;align-items:center;flex-direction:column">
    <div class="spinner"></div>
    <p style="color:#c9a044;font-size:1rem;font-weight:600;margin-top:16px" data-ko="손금을 분석하고 있습니다" data-en="Analyzing your palm lines">손금을 분석하고 있습니다</p>
    <p style="color:#888;font-size:0.8rem;margin-top:8px" data-ko="분석 엔진이 손금 라인을 읽고 있어요..." data-en="The analysis engine is reading your palm lines...">분석 엔진이 손금 라인을 읽고 있어요...</p>
  </div>

  <div class="error" id="error"></div>

  <div class="result-section" id="result" style="display:none">
    <div class="card score-header">
      <div class="score-ring">
        <svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="52" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8"/><circle id="scoreCircle" cx="60" cy="60" r="52" fill="none" stroke="#c9a044" stroke-width="8" stroke-linecap="round" stroke-dasharray="327" stroke-dashoffset="327"/></svg>
        <span class="score-num" id="totalScore"></span>
        <span class="score-grade" id="totalGrade"></span>
      </div>
      <div class="summary-text" id="summary"></div>
    </div>

    <div class="card" id="lines" style="padding:22px"></div>

    <div class="card">
      <h2 data-ko="🖐️ 손의 형태" data-en="🖐️ Hand Shape">🖐️ 손의 형태</h2>
      <div class="hand-shape-box" id="handShape"></div>
    </div>

    <div class="card">
      <h2 data-ko="🔮 운세 풀이" data-en="🔮 Fortune Reading">🔮 운세 풀이</h2>
      <div class="fortune-grid" id="fortune"></div>
    </div>

    <div class="card">
      <h2 data-ko="💡 조언" data-en="💡 Advice">💡 조언</h2>
      <p id="advice" style="font-size:0.88rem;color:#bbb;line-height:1.7"></p>
    </div>

    <button class="btn btn-secondary" onclick="resetForm()" style="margin-top:10px" data-ko="다시 분석하기" data-en="Analyze Again">다시 분석하기</button>
  </div>
</div>

<script>
const API = 'https://karma-api.yama5993.workers.dev';
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const analyzeBtn = document.getElementById('analyzeBtn');
let imageData = null, imageMime = null;

function getLang() {
  return document.documentElement.lang || 'ko';
}

function checkReady() {
  analyzeBtn.disabled = !(imageData && document.getElementById('gender').value);
}

function updateHandLabels() {
  const dom = document.getElementById('dominant').value;
  const lang = getLang();
  const leftEl = document.getElementById('handLeft');
  const rightEl = document.getElementById('handRight');
  if (dom === 'right') {
    leftEl.textContent = lang === 'en' ? 'Left (Innate)' : '왼손 (선천운)';
    rightEl.textContent = lang === 'en' ? 'Right (Acquired)' : '오른손 (후천운)';
  } else {
    leftEl.textContent = lang === 'en' ? 'Left (Acquired)' : '왼손 (후천운)';
    rightEl.textContent = lang === 'en' ? 'Right (Innate)' : '오른손 (선천운)';
  }
}

uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  if (!file.type.startsWith('image/')) return;
  if (file.size > 15 * 1024 * 1024) {
    alert(getLang() === 'en' ? 'Image size exceeds 15MB. Please use a smaller photo.' : '이미지 크기가 15MB를 초과합니다. 더 작은 사진을 사용해주세요.');
    return;
  }
  imageMime = file.type;
  const reader = new FileReader();
  reader.onload = e => {
    imageData = e.target.result.split(',')[1];
    uploadArea.classList.add('has-image');
    uploadArea.innerHTML = `<img src="${e.target.result}" alt="uploaded"><input type="file" id="fileInput" accept="image/*" style="display:none">`;
    document.getElementById('fileInput').addEventListener('change', e2 => { if (e2.target.files[0]) handleFile(e2.target.files[0]); });
    checkReady();
  };
  reader.readAsDataURL(file);
}

analyzeBtn.addEventListener('click', async () => {
  if (!imageData) return;
  analyzeBtn.disabled = true;
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('result').style.display = 'none';
  document.getElementById('error').style.display = 'none';

  try {
    const resp = await fetch(`${API}/api/palm-reading`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        image: imageData, mimeType: imageMime,
        hand: document.getElementById('hand').value,
        gender: document.getElementById('gender').value,
        lang: localStorage.getItem('karma_lang') || 'ko',
      }),
    });
    if (!resp.ok) throw new Error('서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    renderResult(data);
  } catch (e) {
    const err = document.getElementById('error');
    err.textContent = e.message || (getLang() === 'en' ? 'An error occurred during analysis' : '분석 중 오류가 발생했습니다');
    err.style.display = 'block';
  } finally {
    document.getElementById('loading').style.display = 'none';
    analyzeBtn.disabled = false;
  }
});

function renderResult(d) {
  const score = d.overall_score || 0;
  document.getElementById('totalScore').textContent = score;
  const grade = d.overall_grade || getGrade(score);
  document.getElementById('totalGrade').innerHTML = `<span class="grade grade-${grade}">${grade}</span>`;
  document.getElementById('summary').textContent = d.summary || '';

  const offset = 327 - (327 * score / 100);
  document.getElementById('scoreCircle').style.strokeDashoffset = offset;

  const linesEl = document.getElementById('lines');
  linesEl.innerHTML = '<h2>📋 손금 상세 분석</h2>' + (d.lines || []).map(l => `
    <div class="line-item">
      <div class="line-top">
        <span class="line-name">${l.name}</span>
        <span class="line-score">${l.score}점</span>
      </div>
      ${l.length ? `<span class="line-length">${l.length}</span>` : ''}
      <div class="bar-item"><div class="bar-track"><div class="bar-fill" style="width:${l.score}%;background:linear-gradient(90deg,#8b5e2f,#c9a044)"></div></div></div>
      <div class="line-desc">${l.desc}</div>
    </div>
  `).join('');

  const hs = d.hand_shape || {};
  document.getElementById('handShape').innerHTML = `
    <div class="hs-type">${hs.type || '-'}</div>
    <div class="hs-desc">${hs.desc || ''}</div>
  `;

  const fort = d.fortune || {};
  document.getElementById('fortune').innerHTML = [
    ['💰', '재물운', fort.wealth],
    ['💼', '직업운', fort.career],
    ['❤️', '연애운', fort.love],
    ['🏥', '건강운', fort.health],
  ].map(([icon, label, text]) => `
    <div class="fort-card">
      <div class="fort-icon">${icon}</div>
      <div class="fort-label">${label}</div>
      <div class="fort-text">${text || '-'}</div>
    </div>
  `).join('');

  document.getElementById('advice').textContent = d.advice || '';
  document.getElementById('result').style.display = '';
  document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
}

function getGrade(s) {
  if (s >= 90) return 'S'; if (s >= 75) return 'A'; if (s >= 60) return 'B'; if (s >= 40) return 'C'; return 'D';
}

function resetForm() {
  imageData = null; imageMime = null;
  const lang = getLang();
  const uploadText = lang === 'en' ? 'Upload Palm Photo' : '손바닥 사진 업로드';
  const hintLine1 = lang === 'en' ? 'Take a photo with palm lines clearly visible' : '손금이 잘 보이게 손을 펴서 촬영하세요';
  const hintLine2 = lang === 'en' ? 'Tap to select a photo' : '탭하여 사진을 선택하세요';
  uploadArea.classList.remove('has-image');
  uploadArea.innerHTML = `<div class="upload-visual">🤚</div><div class="upload-text" data-ko="손바닥 사진 업로드" data-en="Upload Palm Photo">${uploadText}</div><div class="upload-hint" data-ko="탭하여 사진을 선택하세요" data-en="Tap to select a photo">${hintLine1}<br>${hintLine2}</div><input type="file" id="fileInput" accept="image/*">`;
  document.getElementById('fileInput').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
  analyzeBtn.disabled = true;
  document.getElementById('result').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
<script>
function changeLang(lang) {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-ko][data-en]').forEach(el => {
    el.textContent = el.dataset[lang];
  });
  localStorage.setItem('karma_lang', lang);
}
(function() {
  const saved = localStorage.getItem('karma_lang');
  if (saved) {
    document.getElementById('langSelect').value = saved;
    if (saved !== 'ko') changeLang(saved);
  }
})();
</script>
