<script>
const API = 'https://karma-api.yama5993.workers.dev';
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const analyzeBtn = document.getElementById('analyzeBtn');
let imageData = null, imageMime = null;

function getLang() {
  return document.documentElement.lang || 'ko';
}

function checkReady() {
  analyzeBtn.disabled = !(imageData && document.getElementById('gender').value);
}

function updateHandLabels() {
  const dom = document.getElementById('dominant').value;
  const lang = getLang();
  const leftEl = document.getElementById('handLeft');
  const rightEl = document.getElementById('handRight');
  if (dom === 'right') {
    leftEl.dataset.ko = '왼손 (선천운)'; leftEl.dataset.en = 'Left (Innate)';
    rightEl.dataset.ko = '오른손 (후천운)'; rightEl.dataset.en = 'Right (Acquired)';
  } else {
    leftEl.dataset.ko = '왼손 (후천운)'; leftEl.dataset.en = 'Left (Acquired)';
    rightEl.dataset.ko = '오른손 (선천운)'; rightEl.dataset.en = 'Right (Innate)';
  }
  leftEl.textContent = leftEl.dataset[lang];
  rightEl.textContent = rightEl.dataset[lang];
  // 콤보 드롭다운도 동기화
  [leftEl, rightEl].forEach(optEl => {
    const combo = optEl.closest('.combo') || optEl.closest('select')?.closest('.combo');
    if (!combo) return;
    const comboOpt = combo.querySelector(`.combo-option[data-value="${optEl.value}"]`);
    if (comboOpt) {
      comboOpt.dataset.ko = optEl.dataset.ko;
      comboOpt.dataset.en = optEl.dataset.en;
      comboOpt.textContent = optEl.dataset[lang];
    }
    if (optEl.selected) {
      const trigger = combo.querySelector('.combo-trigger span:first-child');
      if (trigger) trigger.textContent = optEl.dataset[lang];
    }
  });
}

uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  if (!file.type.startsWith('image/')) return;
  if (file.size > 15 * 1024 * 1024) {
    alert(_L('이미지 크기가 15MB를 초과합니다. 더 작은 사진을 사용해주세요.','Image size exceeds 15MB. Please use a smaller photo.'));
    return;
  }
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    const MAX = 2048;
    let w = img.width, h = img.height;
    if (w > MAX || h > MAX) {
      const r = Math.min(MAX / w, MAX / h);
      w = Math.round(w * r); h = Math.round(h * r);
    }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    const jpegDataUrl = canvas.toDataURL('image/jpeg', 0.9);
    imageData = jpegDataUrl.split(',')[1];
    imageMime = 'image/jpeg';
    uploadArea.classList.add('has-image');
    uploadArea.innerHTML = `<img src="${jpegDataUrl}" alt="업로드된 손금 분석용 사진"><input type="file" id="fileInput" accept="image/*" style="display:none">`;
    document.getElementById('fileInput').addEventListener('change', e2 => { if (e2.target.files[0]) handleFile(e2.target.files[0]); });
    checkReady();
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

analyzeBtn.addEventListener('click', async () => {
  if (!imageData) return;
  analyzeBtn.disabled = true;
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('result').style.display = 'none';
  document.getElementById('error').style.display = 'none';

  try {
    const palmInput = {
      hand: document.getElementById('hand').value,
      dominant: document.getElementById('dominant').value,
      gender: document.getElementById('gender').value,
      lang: localStorage.getItem('karma_lang') || 'ko',
    };
    const resp = await fetch(`${API}/api/palm-reading`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        image: imageData, mimeType: imageMime,
        hand: palmInput.hand,
        gender: palmInput.gender,
        lang: palmInput.lang,
      }),
    });
    if (!resp.ok) throw new Error(_L('서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.','A server error occurred. Please try again later.'));
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    window._palmInput = palmInput;
    window._palmResult = data;
    renderResult(data);
  } catch (e) {
    const err = document.getElementById('error');
    err.textContent = e.message || _L('분석 중 오류가 발생했습니다','An error occurred during analysis');
    err.style.display = 'block';
  } finally {
    document.getElementById('loading').style.display = 'none';
    analyzeBtn.disabled = false;
  }
});

function renderResult(d) {
  const score = d.overall_score || 0;
  document.getElementById('totalScore').textContent = score;
  const grade = d.overall_grade || getGrade(score);
  document.getElementById('totalGrade').innerHTML = `<span class="grade grade-${grade}">${grade}</span>`;
  document.getElementById('summary').textContent = d.summary || '';

  const offset = 327 - (327 * score / 100);
  document.getElementById('scoreCircle').style.strokeDashoffset = offset;

  const linesEl = document.getElementById('lines');
  linesEl.innerHTML = '<h2>' + _L('📋 손금 상세 분석','📋 Palm Reading Analysis') + '</h2>' + (d.lines || []).map(l => `
    <div class="line-item">
      <div class="line-top">
        <span class="line-name">${l.name}</span>
        <span class="line-score">${l.score}${_L('점','pts')}</span>
      </div>
      ${l.length ? `<span class="line-length">${l.length}</span>` : ''}
      <div class="bar-item"><div class="bar-track"><div class="bar-fill" style="width:${l.score}%;background:linear-gradient(90deg,#8b5e2f,#c9a044)"></div></div></div>
      <div class="line-desc">${l.desc}</div>
    </div>
  `).join('');

  const hs = d.hand_shape || {};
  document.getElementById('handShape').innerHTML = `
    <div class="hs-type">${hs.type || '-'}</div>
    <div class="hs-desc">${hs.desc || ''}</div>
  `;

  const fort = d.fortune || {};
  document.getElementById('fortune').innerHTML = [
    ['💰', _L('재물운','Wealth'), fort.wealth],
    ['💼', _L('직업운','Career'), fort.career],
    ['❤️', _L('연애운','Love'), fort.love],
    ['🏥', _L('건강운','Health'), fort.health],
  ].map(([icon, label, text]) => `
    <div class="fort-card">
      <div class="fort-icon">${icon}</div>
      <div class="fort-label">${label}</div>
      <div class="fort-text">${text || '-'}</div>
    </div>
  `).join('');

  document.getElementById('advice').textContent = d.advice || '';
  document.getElementById('shareCard').style.display = 'block';
  document.getElementById('result').style.display = '';
  document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
}

function handleShareKakao() {
  const isEn = (document.documentElement.lang === 'en');
  KarmaShare.shareKakao(
    isEn ? 'My Karma Palm Reading' : '내 AI 손금 분석 결과',
    isEn ? 'AI-powered palm reading — check it out' : 'AI가 분석한 내 손금 결과를 확인해보세요'
  );
}

function _restorePalmInput(input) {
  if (!input) return;
  try {
    if (input.dominant) {
      const d = document.getElementById('dominant');
      if (d) d.value = input.dominant;
      updateHandLabels();
    }
    if (input.hand) {
      const h = document.getElementById('hand');
      if (h) h.value = input.hand;
    }
    if (input.gender) {
      const g = document.getElementById('gender');
      if (g) g.value = input.gender;
    }
  } catch (_) {}
}

function getGrade(s) {
  if (s >= 90) return 'S'; if (s >= 75) return 'A'; if (s >= 60) return 'B'; if (s >= 40) return 'C'; return 'D';
}
</script>
<script>
(function() {
  const saved = localStorage.getItem('karma_lang');
  if (saved && saved !== 'ko') { changeLang(saved); return; }
})();

KarmaShare.init({
  type: 'palm',
  lang: (document.documentElement.lang === 'en' ? 'en' : 'ko'),
  pageBase: '/palm',
  getPayload: () => ({ input: window._palmInput || null, result: window._palmResult || null }),
  onLoadShared: ({ input, result }) => {
    window._palmInput = input;
    window._palmResult = result;
    _restorePalmInput(input);
    renderResult(result);
  },
});
</script>
</body>
</html>
