<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karma - 수상 (손금) 분석</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/style.css?v=2">
<style>
.upload-area {
  border: 2px dashed rgba(201,160,68,0.25);
  border-radius: 16px;
  padding: 48px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  margin-bottom: 20px;
  position: relative;
  background: radial-gradient(circle at 50% 40%, rgba(201,160,68,0.06) 0%, transparent 70%);
}
.upload-area:hover, .upload-area.dragover {
  border-color: #c9a044;
  background: radial-gradient(circle at 50% 40%, rgba(201,160,68,0.12) 0%, transparent 70%);
  box-shadow: 0 0 30px rgba(201,160,68,0.08);
}
.upload-area.has-image {
  padding: 0;
  border-style: solid;
  border-color: rgba(201,160,68,0.3);
  background: none;
}
.upload-area .upload-visual {
  width: 80px; height: 80px;
  margin: 0 auto 16px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(201,160,68,0.15), rgba(123,94,167,0.15));
  display: flex; align-items: center; justify-content: center;
  font-size: 2.4rem;
  box-shadow: 0 4px 20px rgba(201,160,68,0.1);
}
.upload-area .upload-text {
  color: #c9a044;
  font-size: 0.95rem;
  font-weight: 600;
  margin-bottom: 6px;
}
.upload-area .upload-hint {
  color: #666;
  font-size: 0.78rem;
  line-height: 1.5;
}
.upload-area img {
  width: 100%;
  max-height: 320px;
  object-fit: cover;
  display: block;
  border-radius: 14px;
}
.upload-area input[type="file"] { display: none; }

.options-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}
.opt-group label {
  font-size: 0.72rem;
  color: #888;
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.opt-group select { width: 100%; margin-bottom: 0; }

.result-section { margin-top: 24px; }
.score-ring {
  width: 120px; height: 120px;
  margin: 0 auto 16px;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.score-ring svg { position: absolute; inset: 0; transform: rotate(-90deg); }
.score-ring .score-num { font-size: 2.8rem; font-weight: 900; color: #c9a044; z-index: 1; }
.score-ring .score-grade { position: absolute; bottom: -4px; right: -4px; z-index: 2; }
.score-header { text-align: center; padding: 28px 20px; margin-bottom: 16px; }
.score-header .summary-text { color: #aaa; font-size: 0.88rem; margin-top: 12px; line-height: 1.5; }

.line-item {
  padding: 16px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.line-item:last-child { border-bottom: none; }
.line-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.line-name { font-weight: 700; color: #e8e0d0; font-size: 0.92rem; }
.line-score { color: #c9a044; font-weight: 700; font-size: 1rem; }
.line-length {
  display: inline-block;
  font-size: 0.7rem;
  color: #b39ddb;
  background: rgba(123,94,167,0.15);
  padding: 2px 8px;
  border-radius: 10px;
  margin-bottom: 6px;
}
.line-desc { font-size: 0.82rem; color: #999; line-height: 1.6; margin-top: 8px; }

.hand-shape-box {
  padding: 18px;
  background: linear-gradient(135deg, rgba(201,160,68,0.08), rgba(123,94,167,0.06));
  border: 1px solid rgba(201,160,68,0.12);
  border-radius: 12px;
  margin-top: 12px;
}
.hand-shape-box .hs-type { font-weight: 700; color: #c9a044; font-size: 1.05rem; margin-bottom: 8px; }
.hand-shape-box .hs-desc { font-size: 0.85rem; color: #bbb; line-height: 1.6; }

.fortune-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
.fort-card {
  padding: 16px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
}
.fort-icon { font-size: 1.4rem; margin-bottom: 6px; }
.fort-label { font-size: 0.7rem; color: #c9a044; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 6px; }
.fort-text { font-size: 0.8rem; color: #bbb; line-height: 1.5; }
</style>
<script src="/js/browser-check.js"></script>
</head>
<body class="bg-saju">
<div class="header-bg"></div>
<nav class="home-nav"><a href="/">🏠 메인</a></nav>
<div class="lang-select-wrap"><select class="lang-select" data-combo-init="1" id="langSelect" onchange="changeLang(this.value)"><option value="ko">🌐 한국어</option><option value="en">🌐 English</option></select></div>
<div class="container">
  <h1>🤚 수상 (손금) 분석</h1>
  <p class="subtitle">AI가 손금을 분석합니다</p>

  <div class="card">
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <div class="upload-visual">🤚</div>
      <div class="upload-text">손바닥 사진 업로드</div>
      <div class="upload-hint">탭하여 사진을 선택하세요</div>
      <input type="file" id="fileInput" accept="image/*">
    </div>
    <div style="font-size:0.72rem;color:#888;line-height:1.6;padding:0 4px;margin-bottom:16px">
      <div style="color:#c9a044;font-weight:600;margin-bottom:4px">📌 주의사항</div>
      • 손바닥을 활짝 펴서 촬영해주세요<br>
      • 손금이 선명하게 보이도록 밝은 곳에서 촬영<br>
      • 손바닥만 나오도록 가까이 촬영해주세요<br>
      • 왼손 = 선천적 운명, 오른손 = 후천적 노력<br>
      • 손가락까지 나오면 더 정확한 분석이 가능합니다
    </div>
    <div class="options-row">
      <div class="opt-group">
        <label>촬영한 손</label>
        <select id="hand">
          <option value="왼손">왼손 (선천운)</option>
          <option value="오른손">오른손 (후천운)</option>
        </select>
      </div>
      <div class="opt-group">
        <label>성별</label>
        <select id="gender" onchange="checkReady()">
          <option value="" disabled selected>선택하세요</option>
          <option value="남성">남성</option>
          <option value="여성">여성</option>
        </select>
      </div>
    </div>
    <button class="btn" id="analyzeBtn" disabled>손금 분석하기</button>
  </div>

  <div class="loading" id="loading" style="display:none">
    <div class="spinner"></div>
    <p>손금을 분석하고 있습니다...</p>
  </div>

  <div class="error" id="error"></div>

  <div class="result-section" id="result" style="display:none">
    <div class="card score-header">
      <div class="score-ring">
        <svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="52" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8"/><circle id="scoreCircle" cx="60" cy="60" r="52" fill="none" stroke="#c9a044" stroke-width="8" stroke-linecap="round" stroke-dasharray="327" stroke-dashoffset="327"/></svg>
        <span class="score-num" id="totalScore"></span>
        <span class="score-grade" id="totalGrade"></span>
      </div>
      <div class="summary-text" id="summary"></div>
    </div>

    <div class="card" id="lines" style="padding:22px"></div>

    <div class="card">
      <h2>🖐️ 손의 형태</h2>
      <div class="hand-shape-box" id="handShape"></div>
    </div>

    <div class="card">
      <h2>🔮 운세 풀이</h2>
      <div class="fortune-grid" id="fortune"></div>
    </div>

    <div class="card">
      <h2>💡 조언</h2>
      <p id="advice" style="font-size:0.88rem;color:#bbb;line-height:1.7"></p>
    </div>

    <button class="btn btn-secondary" onclick="resetForm()" style="margin-top:10px">다시 분석하기</button>
  </div>
</div>

<script>
const API = 'https://karma-api.yama5993.workers.dev';
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const analyzeBtn = document.getElementById('analyzeBtn');
let imageData = null, imageMime = null;

function checkReady() {
  analyzeBtn.disabled = !(imageData && document.getElementById('gender').value);
}

uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  if (!file.type.startsWith('image/')) return;
  imageMime = file.type;
  const reader = new FileReader();
  reader.onload = e => {
    imageData = e.target.result.split(',')[1];
    uploadArea.classList.add('has-image');
    uploadArea.innerHTML = `<img src="${e.target.result}" alt="uploaded"><input type="file" id="fileInput" accept="image/*" style="display:none">`;
    document.getElementById('fileInput').addEventListener('change', e2 => { if (e2.target.files[0]) handleFile(e2.target.files[0]); });
    checkReady();
  };
  reader.readAsDataURL(file);
}

analyzeBtn.addEventListener('click', async () => {
  if (!imageData) return;
  analyzeBtn.disabled = true;
  document.getElementById('loading').style.display = '';
  document.getElementById('result').style.display = 'none';
  document.getElementById('error').style.display = 'none';

  try {
    const resp = await fetch(`${API}/api/palm-reading`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        image: imageData, mimeType: imageMime,
        hand: document.getElementById('hand').value,
        gender: document.getElementById('gender').value,
      }),
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    renderResult(data);
  } catch (e) {
    const err = document.getElementById('error');
    err.textContent = e.message || '분석 중 오류가 발생했습니다';
    err.style.display = 'block';
  } finally {
    document.getElementById('loading').style.display = 'none';
    analyzeBtn.disabled = false;
  }
});

function renderResult(d) {
  const score = d.overall_score || 0;
  document.getElementById('totalScore').textContent = score;
  const grade = d.overall_grade || getGrade(score);
  document.getElementById('totalGrade').innerHTML = `<span class="grade grade-${grade}">${grade}</span>`;
  document.getElementById('summary').textContent = d.summary || '';

  const offset = 327 - (327 * score / 100);
  document.getElementById('scoreCircle').style.strokeDashoffset = offset;

  const linesEl = document.getElementById('lines');
  linesEl.innerHTML = '<h2>📋 손금 상세 분석</h2>' + (d.lines || []).map(l => `
    <div class="line-item">
      <div class="line-top">
        <span class="line-name">${l.name}</span>
        <span class="line-score">${l.score}점</span>
      </div>
      ${l.length ? `<span class="line-length">${l.length}</span>` : ''}
      <div class="bar-item"><div class="bar-track"><div class="bar-fill" style="width:${l.score}%;background:linear-gradient(90deg,#8b5e2f,#c9a044)"></div></div></div>
      <div class="line-desc">${l.desc}</div>
    </div>
  `).join('');

  const hs = d.hand_shape || {};
  document.getElementById('handShape').innerHTML = `
    <div class="hs-type">${hs.type || '-'}</div>
    <div class="hs-desc">${hs.desc || ''}</div>
  `;

  const fort = d.fortune || {};
  document.getElementById('fortune').innerHTML = [
    ['💰', '재물운', fort.wealth],
    ['💼', '직업운', fort.career],
    ['❤️', '연애운', fort.love],
    ['🏥', '건강운', fort.health],
  ].map(([icon, label, text]) => `
    <div class="fort-card">
      <div class="fort-icon">${icon}</div>
      <div class="fort-label">${label}</div>
      <div class="fort-text">${text || '-'}</div>
    </div>
  `).join('');

  document.getElementById('advice').textContent = d.advice || '';
  document.getElementById('result').style.display = '';
  document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
}

function getGrade(s) {
  if (s >= 90) return 'S'; if (s >= 75) return 'A'; if (s >= 60) return 'B'; if (s >= 40) return 'C'; return 'D';
}

function resetForm() {
  imageData = null; imageMime = null;
  uploadArea.classList.remove('has-image');
  uploadArea.innerHTML = '<div class="upload-visual">🤚</div><div class="upload-text">손바닥 사진 업로드</div><div class="upload-hint">손금이 잘 보이게 손을 펴서 촬영하세요<br>탭하여 사진을 선택하세요</div><input type="file" id="fileInput" accept="image/*">';
  document.getElementById('fileInput').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
  analyzeBtn.disabled = true;
  document.getElementById('result').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
<script>function changeLang(l){document.documentElement.lang=l;localStorage.setItem("karma_lang",l)}(function(){var s=localStorage.getItem("karma_lang");if(s){var e=document.getElementById("langSelect");if(e)e.value=s;document.documentElement.lang=s}})()</script>
</body>
</html>
