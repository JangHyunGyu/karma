<link rel="alternate" hreflang="en" href="https://karma.archerlab.dev/login-en.html">

<link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32.png">

<body>
<div class="header-bg"></div>
<nav class="home-nav"><a href="/">🏠 메인</a></nav>
<div class="lang-select-wrap"><select class="lang-select" data-combo-init="1" id="langSelect" onchange="changeLang(this.value)"><option value="ko">🌐 한국어</option><option value="en">🌐 English</option></select></div>
<div class="container">
  <h1>Karma</h1>
  <p class="subtitle">프로필 매칭 로그인</p>

  <div class="card">
    <h2>로그인</h2>
    <div class="error" id="loginError"></div>
    <label>ID</label>
    <input type="text" id="loginId" placeholder="영문/숫자 ID">
    <label>비밀번호</label>
    <input type="password" id="loginPw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" onclick="doLogin()">로그인</button>
    <p class="link"><a href="/register.html">계정이 없으신가요? 회원가입</a></p>
  </div>

</div>

<script src="/js/components.js?v=5"></script>
<script>
function showError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.style.display = 'block';
}

async function doLogin() {
  const user_id = document.getElementById('loginId').value.trim();
  const password = document.getElementById('loginPw').value;
  if (!user_id || !password) return showError('ID와 비밀번호를 입력하세요');

  try {
    const resp = await fetch(API_BASE + '/api/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ user_id, password }),
    });
    const data = await resp.json();
    if (!data.success) return showError(data.error);
    sessionStorage.setItem('user_id', user_id);
    sessionStorage.setItem('password', password);
    location.href = '/discover.html';
  } catch(e) {
    showError('서버 오류: ' + e.message);
  }
}
</script>
<script>(function(){var s=localStorage.getItem("karma_lang");if(s&&s!=='ko'){changeLang(s);return}})()</script>
</body>
</html>
