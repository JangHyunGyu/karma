<script>
createDateSelects('dateSelects');

// 날짜 선택 (어제 ~ +7일)
(function() {
  const sel = document.getElementById('targetDate');
  const now = new Date();
  const labels = { '-1': '어제', '0': '오늘', '1': '내일', '2': '모레' };
  const labelsEn = { '-1': 'Yesterday', '0': 'Today', '1': 'Tomorrow', '2': 'Day after' };
  for (let i = -1; i <= 7; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() + i);
    const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const mm = d.getMonth() + 1, dd = d.getDate();
    const koLabel = labels[String(i)] ? `${mm}/${dd} (${labels[String(i)]})` : `${mm}/${dd}`;
    const enLabel = labelsEn[String(i)] ? `${mm}/${dd} (${labelsEn[String(i)]})` : `${mm}/${dd}`;
    const opt = document.createElement('option');
    opt.value = val;
    opt.dataset.ko = koLabel;
    opt.dataset.en = enLabel;
    opt.textContent = koLabel;
    if (i === 0) opt.selected = true;
    sel.appendChild(opt);
  }
})();

async function doDaily() {
  const btn = document.getElementById('dailyBtn');
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');
  btn.disabled = true;
  loading.style.display = 'flex';
  result.style.display = 'none';

  try {
    const dailyInput = {
      birth_date: getBirthDate(),
      birth_time: document.getElementById('birthTime').value,
      gender: document.getElementById('gender').value,
      target_date: document.getElementById('targetDate').value,
      lang: 'ko',
      yajasi: document.getElementById('yajasiToggle')?.checked || false,
      birth_location: document.getElementById('birthLocation')?.value || 'kr',
    };
    const resp = await fetch(API_BASE + '/api/daily', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(dailyInput),
    });
    if (!resp.ok) { alert(_L('서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.','A server error occurred. Please try again later.')); return; }
    const data = await resp.json();
    if (data.error || !data.daily) { alert(data.error || _L('운세 분석 실패','Fortune analysis failed')); return; }
    window._dailyInput = augmentShareInput(dailyInput);
    window._dailyResult = data;
    renderDaily(data);
  } catch(e) {
    alert(_L('오류: ','Error: ') + e.message);
  } finally {
    btn.disabled = false;
    loading.style.display = 'none';
  }
}

function renderDaily(d) {
  const f = d.daily;
  const OHANG_EMOJI = {'목':'🌿','화':'🔥','토':'🏔','금':'⚔','수':'🌊'};

  document.getElementById('dailyDateTitle').textContent = '📅 ' + _L(d.date + ' 운세', d.date + ' Fortune');
  document.getElementById('sajuInfo').textContent = _L('일간: ','Day Master: ') + d.ilgan + ' ' + (OHANG_EMOJI[d.ilganOhang]||'') + d.ilganOhang + ' | ' + d.saju_summary;
  document.getElementById('dailySummary').textContent = f.overall || '';
  document.getElementById('dailyLove').textContent = f.love || '';
  document.getElementById('dailyMoney').textContent = f.money || '';
  document.getElementById('dailyCareer').textContent = f.career || '';
  document.getElementById('dailyStudy').textContent = f.study || '';
  document.getElementById('dailySocial').textContent = f.social || '';
  document.getElementById('dailyHealth').textContent = f.health || '';
  document.getElementById('dailyAdvice').textContent = f.advice || '';

  if (f.lucky) {
    document.getElementById('dailyLucky').innerHTML =
      (f.lucky.color ? '<span class="tag tag-good">' + _L('🎨 행운의 색: ','🎨 Lucky Color: ') + esc(f.lucky.color) + '</span>' : '') +
      (f.lucky.number ? '<span class="tag tag-good">' + _L('🔢 행운의 숫자: ','🔢 Lucky Number: ') + esc(String(f.lucky.number)) + '</span>' : '');
  }

  document.getElementById('result').style.display = 'grid';
  document.getElementById('shareCard').style.display = 'block';
  document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
}

function handleShareKakao() {
  const isEn = (document.documentElement.lang === 'en');
  const date = (window._dailyInput && window._dailyInput.target_date) || '';
  KarmaShare.shareKakao(
    isEn ? (date ? `My Fortune for ${date}` : 'My Daily Fortune') : (date ? `${date} 내 운세` : '내 오늘의 운세'),
    isEn ? 'Daily AI fortune — check it out' : '사주 기반 AI 오늘의 운세 결과를 확인해보세요'
  );
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function _restoreDailyInput(input) {
  if (!input) return;
  restoreShareInput(input);
  try {
    if (input.target_date) {
      const el = document.getElementById('targetDate');
      if (el) {
        const hasOpt = Array.from(el.options).some(o => o.value === input.target_date);
        if (!hasOpt) { const opt = document.createElement('option'); opt.value = input.target_date; opt.textContent = input.target_date; el.appendChild(opt); }
        el.value = input.target_date;
      }
    }
  } catch (_) {}
}

KarmaShare.init({
  type: 'daily',
  lang: (document.documentElement.lang === 'en' ? 'en' : 'ko'),
  pageBase: '/daily',
  getPayload: () => ({ input: window._dailyInput || null, result: window._dailyResult || null }),
  onLoadShared: ({ input, result }) => {
    window._dailyInput = input;
    window._dailyResult = result;
    _restoreDailyInput(input);
    renderDaily(result);
  },
});
</script>
