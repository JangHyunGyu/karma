<script>
(function() {
  'use strict';

  const API_BASE = 'https://karma-api.yama5993.workers.dev';
  const lang = () => document.documentElement.lang || 'ko';
  const _L = (ko, en) => lang() === 'en' ? en : ko;

  // ===== Tarot Card Data =====
  const MAJOR_ARCANA = [
    { id: 0, name: 'The Fool', nameKo: '광대' },
    { id: 1, name: 'The Magician', nameKo: '마법사' },
    { id: 2, name: 'The High Priestess', nameKo: '여사제' },
    { id: 3, name: 'The Empress', nameKo: '여황제' },
    { id: 4, name: 'The Emperor', nameKo: '황제' },
    { id: 5, name: 'The Hierophant', nameKo: '교황' },
    { id: 6, name: 'The Lovers', nameKo: '연인' },
    { id: 7, name: 'The Chariot', nameKo: '전차' },
    { id: 8, name: 'Strength', nameKo: '힘' },
    { id: 9, name: 'The Hermit', nameKo: '은둔자' },
    { id: 10, name: 'Wheel of Fortune', nameKo: '운명의 수레바퀴' },
    { id: 11, name: 'Justice', nameKo: '정의' },
    { id: 12, name: 'The Hanged Man', nameKo: '매달린 사람' },
    { id: 13, name: 'Death', nameKo: '죽음' },
    { id: 14, name: 'Temperance', nameKo: '절제' },
    { id: 15, name: 'The Devil', nameKo: '악마' },
    { id: 16, name: 'The Tower', nameKo: '탑' },
    { id: 17, name: 'The Star', nameKo: '별' },
    { id: 18, name: 'The Moon', nameKo: '달' },
    { id: 19, name: 'The Sun', nameKo: '태양' },
    { id: 20, name: 'Judgement', nameKo: '심판' },
    { id: 21, name: 'The World', nameKo: '세계' },
  ];

  // Rider-Waite 카드 이미지 (퍼블릭 도메인 — 로컬 호스팅, WebP)
  function getCardImageUrl(id) {
    return '/images/tarot/ar' + String(id).padStart(2, '0') + '.webp';
  }

  // ===== Three.js Scene Setup =====
  const canvas = document.getElementById('tarot-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x0a0a1e, 1);

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0a0a1e, 0.02);

  // 해상도별 카메라 설정 (큰 카드에 맞게)
  function getCameraConfig() {
    const w = window.innerWidth;
    if (w <= 400) return { fov: 68, y: 14, z: 18 };       // 소형 모바일
    if (w <= 480) return { fov: 64, y: 13, z: 17 };       // 일반 모바일
    if (w <= 768) return { fov: 58, y: 12, z: 16 };       // 대형 모바일 / 소형 태블릿
    if (w <= 1024) return { fov: 52, y: 11, z: 15 };      // 태블릿
    return { fov: 48, y: 10, z: 14 };                      // 데스크톱
  }
  const camCfg = getCameraConfig();
  const camera = new THREE.PerspectiveCamera(camCfg.fov, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, camCfg.y, camCfg.z);
  camera.lookAt(0, 0, 0);

  // Lighting — 밝고 따뜻한 조명
  const ambientLight = new THREE.AmbientLight(0x8888aa, 1.2);
  scene.add(ambientLight);
  const pointLight = new THREE.PointLight(0xffd080, 2.0, 40);
  pointLight.position.set(0, 10, 6);
  scene.add(pointLight);
  const pointLight2 = new THREE.PointLight(0x6688ff, 0.6, 25);
  pointLight2.position.set(-6, 6, -3);
  scene.add(pointLight2);
  const pointLight3 = new THREE.PointLight(0xffc060, 1.0, 30);
  pointLight3.position.set(5, 5, 4);
  scene.add(pointLight3);

  // ===== Card Creation =====
  const CARD_W = 1.0;
  const CARD_H = 1.7;
  const cardMeshes = [];
  const selectedCards = [];
  let phase = 'selecting'; // selecting, reading, result

  // 카드 뒷면 텍스처 (프로시저럴 — 고퀄리티)
  function createBackTexture() {
    const c = document.createElement('canvas');
    c.width = 512; c.height = 840;
    const ctx = c.getContext('2d');
    const W = 512, H = 840;

    // 배경 — 진한 보라+파랑 (배경과 확실히 구분)
    const bgGrad = ctx.createRadialGradient(W/2, H/2, 30, W/2, H/2, W * 0.6);
    bgGrad.addColorStop(0, '#3d2266');
    bgGrad.addColorStop(0.4, '#2d1855');
    bgGrad.addColorStop(1, '#1e1040');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // 외곽 밝은 골드 테두리 (두껍게)
    ctx.strokeStyle = '#e0c060';
    ctx.lineWidth = 10;
    ctx.strokeRect(10, 10, W-20, H-20);
    ctx.strokeStyle = '#c9a044';
    ctx.lineWidth = 3;
    ctx.strokeRect(26, 26, W-52, H-52);

    // 4 모서리 장식
    const cornerSize = 40;
    [[28, 28], [W-28, 28], [28, H-28], [W-28, H-28]].forEach(([cx, cy]) => {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.beginPath();
      ctx.arc(0, 0, cornerSize, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(201,160,68,0.3)';
      ctx.lineWidth = 1;
      ctx.stroke();
      for (let a = 0; a < 4; a++) {
        ctx.beginPath();
        ctx.moveTo(0, 0);
        const angle = a * Math.PI / 2;
        ctx.lineTo(Math.cos(angle) * cornerSize * 0.8, Math.sin(angle) * cornerSize * 0.8);
        ctx.strokeStyle = 'rgba(240,212,138,0.3)';
        ctx.stroke();
      }
      ctx.restore();
    });

    // 중앙 문양
    ctx.save();
    ctx.translate(W/2, H/2);

    // 외곽 원환
    for (let r = 120; r >= 40; r -= 40) {
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.strokeStyle = r === 120 ? '#c9a044' : 'rgba(201,160,68,0.3)';
      ctx.lineWidth = r === 120 ? 3 : 1;
      ctx.stroke();
    }

    // 8방향 다이아몬드
    for (let i = 0; i < 8; i++) {
      ctx.save();
      ctx.rotate(i * Math.PI / 4);
      ctx.beginPath();
      ctx.moveTo(0, -110);
      ctx.lineTo(18, -60);
      ctx.lineTo(0, -45);
      ctx.lineTo(-18, -60);
      ctx.closePath();
      ctx.fillStyle = 'rgba(201,160,68,0.12)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(201,160,68,0.5)';
      ctx.lineWidth = 1;
      ctx.stroke();
      // 바깥 선
      ctx.beginPath();
      ctx.moveTo(0, -120);
      ctx.lineTo(0, -130);
      ctx.strokeStyle = 'rgba(201,160,68,0.4)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();
    }

    // 중앙 오망성 (펜타그램)
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
      const method = i === 0 ? 'moveTo' : 'lineTo';
      ctx[method](Math.cos(angle) * 38, Math.sin(angle) * 38);
    }
    ctx.closePath();
    ctx.strokeStyle = '#f0d48a';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = 'rgba(240,212,138,0.08)';
    ctx.fill();

    // 중앙 원 + 글로우
    const glowGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 25);
    glowGrad.addColorStop(0, 'rgba(201,160,68,0.3)');
    glowGrad.addColorStop(1, 'rgba(201,160,68,0)');
    ctx.beginPath();
    ctx.arc(0, 0, 25, 0, Math.PI * 2);
    ctx.fillStyle = glowGrad;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(0, 0, 12, 0, Math.PI * 2);
    ctx.fillStyle = '#c9a044';
    ctx.fill();

    ctx.restore();

    // 상단 / 하단 장식 패턴
    [80, H - 80].forEach(yPos => {
      ctx.save();
      ctx.translate(W/2, yPos);
      ctx.beginPath();
      ctx.moveTo(-80, 0);
      ctx.lineTo(-40, -12);
      ctx.lineTo(0, -16);
      ctx.lineTo(40, -12);
      ctx.lineTo(80, 0);
      ctx.lineTo(40, 12);
      ctx.lineTo(0, 16);
      ctx.lineTo(-40, 12);
      ctx.closePath();
      ctx.strokeStyle = 'rgba(201,160,68,0.5)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = 'rgba(201,160,68,0.06)';
      ctx.fill();
      ctx.restore();
    });

    // KARMA 텍스트 (하단)
    ctx.fillStyle = '#c9a044';
    ctx.font = 'bold 28px serif';
    ctx.textAlign = 'center';
    ctx.letterSpacing = '6px';
    ctx.fillText('K A R M A', W/2, H - 40);

    // 미세한 노이즈 텍스처
    const imgData = ctx.getImageData(0, 0, W, H);
    for (let i = 0; i < imgData.data.length; i += 4) {
      const noise = (Math.random() - 0.5) * 8;
      imgData.data[i] += noise;
      imgData.data[i+1] += noise;
      imgData.data[i+2] += noise;
    }
    ctx.putImageData(imgData, 0, 0);

    return new THREE.CanvasTexture(c);
  }

  const backTexture = createBackTexture();

  // 카드 앞면 텍스처 로더
  const textureLoader = new THREE.TextureLoader();
  textureLoader.crossOrigin = 'anonymous';

  function createCard(card, index) {
    const group = new THREE.Group();
    group.userData = { card, index, selected: false, faceLoaded: false };

    // 카드 지오메트리
    const geo = new THREE.PlaneGeometry(CARD_W, CARD_H);

    // 뒷면 (보이는 면) — 밝게
    const backMat = new THREE.MeshStandardMaterial({
      map: backTexture,
      side: THREE.FrontSide,
      roughness: 0.6,
      metalness: 0.1,
      emissive: 0x1a0a2e,
      emissiveIntensity: 0.3,
    });
    const backMesh = new THREE.Mesh(geo, backMat);
    group.add(backMesh);

    // 앞면 (뒤집혔을 때 보임) — 로딩 전 기본 색상
    const frontMat = new THREE.MeshStandardMaterial({
      color: 0xf5f0e0,
      side: THREE.FrontSide,
      roughness: 0.5,
      metalness: 0.1,
    });
    const frontMesh = new THREE.Mesh(geo, frontMat);
    frontMesh.rotation.y = Math.PI; // 뒤집어서
    group.add(frontMesh);

    group.userData.frontMat = frontMat;
    group.userData.frontMesh = frontMesh;

    // 카드 테두리 빛 (선택 시)
    const edgeGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(CARD_W + 0.04, CARD_H + 0.04, 0.02));
    const edgeMat = new THREE.LineBasicMaterial({ color: 0xc9a044, transparent: true, opacity: 0 });
    const edgeLine = new THREE.LineSegments(edgeGeo, edgeMat);
    group.add(edgeLine);
    group.userData.edgeMat = edgeMat;

    scene.add(group);
    cardMeshes.push(group);
    return group;
  }

  // ===== Card Layout — 해상도별 최적화 =====
  function layoutCards() {
    const total = MAJOR_ARCANA.length;
    const w = window.innerWidth;
    let cols, spacingX, spacingZ;
    if (w <= 400) {        // 소형 모바일
      cols = 4;
      spacingX = CARD_W * 1.6;
      spacingZ = CARD_H * 0.9;
    } else if (w <= 480) { // 일반 모바일
      cols = 5;
      spacingX = CARD_W * 1.5;
      spacingZ = CARD_H * 0.85;
    } else if (w <= 768) { // 대형 모바일 / 소형 태블릿
      cols = 6;
      spacingX = CARD_W * 1.45;
      spacingZ = CARD_H * 0.8;
    } else if (w <= 1024) { // 태블릿
      cols = 8;
      spacingX = CARD_W * 1.4;
      spacingZ = CARD_H * 0.75;
    } else {               // 데스크톱
      cols = 11;
      spacingX = CARD_W * 1.4;
      spacingZ = CARD_H * 0.75;
    }
    const rows = Math.ceil(total / cols);

    cardMeshes.forEach((mesh, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const rowCount = row < rows - 1 ? cols : total - row * cols;
      const x = (col - (rowCount - 1) / 2) * spacingX;
      const z = (row - (rows - 1) / 2) * spacingZ - 1;

      mesh.position.set(x, 0.02, z);
      mesh.rotation.x = -Math.PI / 2;
      mesh.rotation.y = 0;
      mesh.rotation.z = 0;
      mesh.scale.set(1, 1, 1);
    });
  }

  // ===== Initial Animation — Cards Deal =====
  function dealCards() {
    cardMeshes.forEach((mesh, i) => {
      const target = { x: mesh.position.x, y: mesh.position.y, z: mesh.position.z };
      mesh.position.set(0, 5, 0);
      mesh.rotation.x = 0;
      mesh.scale.set(0.01, 0.01, 0.01);

      gsap.to(mesh.position, {
        x: target.x, y: target.y, z: target.z,
        duration: 0.6,
        delay: i * 0.04,
        ease: 'back.out(1.2)',
      });
      gsap.to(mesh.rotation, {
        x: -Math.PI / 2,
        duration: 0.5,
        delay: i * 0.04,
        ease: 'power2.out',
      });
      gsap.to(mesh.scale, {
        x: 1, y: 1, z: 1,
        duration: 0.5,
        delay: i * 0.04,
        ease: 'power2.out',
      });
    });
  }

  // ===== Card Hover & Selection =====
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let hoveredCard = null;

  function onPointerMove(e) {
    if (phase !== 'selecting') return;
    const rect = canvas.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  }

  function onPointerClick(e) {
    if (phase !== 'selecting') return;
    const rect = canvas.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(cardMeshes, true);

    if (intersects.length > 0) {
      let cardGroup = intersects[0].object;
      while (cardGroup.parent && !cardGroup.userData.card) cardGroup = cardGroup.parent;
      if (!cardGroup.userData.card) return;

      toggleCardSelection(cardGroup);
    }
  }

  function toggleCardSelection(cardGroup) {
    const idx = selectedCards.indexOf(cardGroup);
    if (idx !== -1) {
      // 선택 해제
      selectedCards.splice(idx, 1);
      cardGroup.userData.selected = false;
      gsap.to(cardGroup.position, { y: 0.02, duration: 0.3, ease: 'power2.out' });
      gsap.to(cardGroup.userData.edgeMat, { opacity: 0, duration: 0.3 });
    } else if (selectedCards.length < 3) {
      // 선택
      selectedCards.push(cardGroup);
      cardGroup.userData.selected = true;
      gsap.to(cardGroup.position, { y: 0.5, duration: 0.3, ease: 'back.out(2)' });
      gsap.to(cardGroup.userData.edgeMat, { opacity: 1, duration: 0.3 });

      if (selectedCards.length === 3) {
        setTimeout(startReading, 600);
      }
    }

    updateSelectedInfo();
  }

  function updateSelectedInfo() {
    const info = document.getElementById('selectedInfo');
    if (selectedCards.length === 0) {
      info.textContent = '';
    } else {
      info.textContent = _L(
        `${selectedCards.length}/3 장 선택됨`,
        `${selectedCards.length}/3 cards selected`
      );
    }
  }

  // ===== Reading Animation =====
  function startReading() {
    phase = 'reading';
    document.getElementById('tarotInstruction').style.display = 'none';
    document.getElementById('selectedInfo').style.display = 'none';
    document.getElementById('questionWrap').style.display = 'none';

    // 선택되지 않은 카드 사라지기
    cardMeshes.forEach(mesh => {
      if (!mesh.userData.selected) {
        gsap.to(mesh.position, { y: -3, duration: 0.5, ease: 'power2.in' });
        gsap.to(mesh.scale, { x: 0, y: 0, z: 0, duration: 0.4, ease: 'power2.in' });
      }
    });

    // 선택된 3장을 앞으로 이동
    const positions = [
      { x: -2.5, y: 1.5, z: 4 },
      { x: 0, y: 1.5, z: 4 },
      { x: 2.5, y: 1.5, z: 4 },
    ];

    const labels = [_L('과거', 'Past'), _L('현재', 'Present'), _L('미래', 'Future')];

    selectedCards.forEach((card, i) => {
      // 역방향 랜덤 결정 (50% 확률)
      card.userData.reversed = Math.random() < 0.5;

      gsap.to(card.position, {
        x: positions[i].x, y: positions[i].y, z: positions[i].z,
        duration: 0.8,
        delay: 0.5 + i * 0.2,
        ease: 'power2.inOut',
      });
      gsap.to(card.rotation, {
        x: -0.3,
        z: card.userData.reversed ? Math.PI : 0,
        duration: 0.8,
        delay: 0.5 + i * 0.2,
        ease: 'power2.inOut',
      });
    });

    // 카드 뒤집기 (앞면 보여주기)
    setTimeout(() => {
      selectedCards.forEach((card, i) => {
        loadFrontTexture(card);
        gsap.to(card.rotation, {
          y: Math.PI,
          duration: 0.8,
          delay: i * 0.3,
          ease: 'power2.inOut',
          onComplete: () => {
            if (i === 2) {
              // 파티클 이펙트
              createRevealParticles();
              // AI 해석 요청
              requestReading();
            }
          }
        });
      });
    }, 2000);
  }

  function loadFrontTexture(cardGroup) {
    if (cardGroup.userData.faceLoaded) return;
    const id = cardGroup.userData.card.id;
    const url = getCardImageUrl(id);
    textureLoader.load(url, (texture) => {
      texture.minFilter = THREE.LinearFilter;
      texture.magFilter = THREE.LinearFilter;
      cardGroup.userData.frontMat.map = texture;
      cardGroup.userData.frontMat.color.set(0xffffff);
      cardGroup.userData.frontMat.needsUpdate = true;
      cardGroup.userData.faceLoaded = true;
    }, undefined, () => {
      // 로드 실패 시 텍스트 표시
      const c = document.createElement('canvas');
      c.width = 256; c.height = 420;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#f5f0e0';
      ctx.fillRect(0, 0, 256, 420);
      ctx.fillStyle = '#1a0a2e';
      ctx.font = 'bold 24px serif';
      ctx.textAlign = 'center';
      ctx.fillText(cardGroup.userData.card.nameKo, 128, 200);
      ctx.font = '14px serif';
      ctx.fillText(cardGroup.userData.card.name, 128, 230);
      const fallback = new THREE.CanvasTexture(c);
      cardGroup.userData.frontMat.map = fallback;
      cardGroup.userData.frontMat.color.set(0xffffff);
      cardGroup.userData.frontMat.needsUpdate = true;
      cardGroup.userData.faceLoaded = true;
    });
  }

  // ===== Particle Effects =====
  function createRevealParticles() {
    const count = 200;
    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);
    const sizes = new Float32Array(count);

    for (let i = 0; i < count; i++) {
      positions[i * 3] = (Math.random() - 0.5) * 8;
      positions[i * 3 + 1] = Math.random() * 4 + 0.5;
      positions[i * 3 + 2] = Math.random() * 4 + 1;
      const gold = Math.random() > 0.3;
      colors[i * 3] = gold ? 0.9 : 0.3;
      colors[i * 3 + 1] = gold ? 0.7 : 0.3;
      colors[i * 3 + 2] = gold ? 0.2 : 0.9;
      sizes[i] = Math.random() * 3 + 1;
    }

    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    const mat = new THREE.PointsMaterial({
      size: 0.08,
      vertexColors: true,
      transparent: true,
      opacity: 1,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });

    const particles = new THREE.Points(geo, mat);
    scene.add(particles);

    // 파티클 애니메이션
    const startTime = Date.now();
    function animateParticles() {
      const elapsed = (Date.now() - startTime) / 1000;
      if (elapsed > 3) {
        scene.remove(particles);
        geo.dispose();
        mat.dispose();
        return;
      }
      const posArr = geo.attributes.position.array;
      for (let i = 0; i < count; i++) {
        posArr[i * 3 + 1] += 0.02;
        posArr[i * 3] += (Math.random() - 0.5) * 0.02;
      }
      geo.attributes.position.needsUpdate = true;
      mat.opacity = 1 - elapsed / 3;
      requestAnimationFrame(animateParticles);
    }
    animateParticles();
  }

  // ===== Floating animation for selected cards =====
  function floatSelectedCards(time) {
    if (phase === 'reading' || phase === 'result') {
      selectedCards.forEach((card, i) => {
        card.position.y = 1.5 + Math.sin(time * 0.001 + i * 1.5) * 0.06;
      });
    }
  }

  // ===== Hover check =====
  function checkHover() {
    if (phase !== 'selecting') {
      document.body.style.cursor = 'default';
      return;
    }
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(cardMeshes, true);

    if (hoveredCard) {
      if (!hoveredCard.userData.selected) {
        gsap.to(hoveredCard.position, { y: 0.02, duration: 0.2 });
        gsap.to(hoveredCard.userData.edgeMat, { opacity: 0, duration: 0.2 });
      }
      hoveredCard = null;
    }

    if (intersects.length > 0) {
      let cardGroup = intersects[0].object;
      while (cardGroup.parent && !cardGroup.userData.card) cardGroup = cardGroup.parent;
      if (cardGroup.userData.card && !cardGroup.userData.selected) {
        hoveredCard = cardGroup;
        gsap.to(cardGroup.position, { y: 0.25, duration: 0.2 });
        gsap.to(cardGroup.userData.edgeMat, { opacity: 0.5, duration: 0.2 });
        document.body.style.cursor = 'pointer';
        return;
      }
    }
    document.body.style.cursor = 'default';
  }

  // ===== Background Stars =====
  function createStars() {
    const count = 500;
    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
      positions[i * 3] = (Math.random() - 0.5) * 40;
      positions[i * 3 + 1] = Math.random() * 15 + 3;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 40 - 10;
    }
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 0.04,
      transparent: true,
      opacity: 0.6,
      blending: THREE.AdditiveBlending,
    });
    const stars = new THREE.Points(geo, mat);
    scene.add(stars);
    return stars;
  }
  const stars = createStars();

  // ===== API Call =====
  async function requestReading() {
    document.getElementById('tarotLoading').classList.add('show');

    const cardsData = selectedCards.map(c => ({
      id: c.userData.card.id,
      reversed: c.userData.reversed,
    }));

    const question = document.getElementById('tarotQuestion').value.trim();

    try {
      const resp = await fetch(API_BASE + '/api/tarot', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          cards: cardsData,
          question,
          lang: lang(),
        }),
      });

      const data = await resp.json();
      if (data.error) throw new Error(data.error);

      document.getElementById('tarotLoading').classList.remove('show');
      showResult(data);
    } catch (err) {
      document.getElementById('tarotLoading').classList.remove('show');
      showError(err.message);
    }
  }

  // ===== Show Result =====
  function showResult(data) {
    phase = 'result';

    // 3D 캔버스를 상단 고정 높이로 줄이고, 카드를 위로 이동
    canvas.style.position = 'relative';
    canvas.style.height = '300px';
    renderer.setSize(window.innerWidth, 300);
    camera.aspect = window.innerWidth / 300;
    camera.updateProjectionMatrix();
    camera.position.set(0, 6, 8);
    camera.lookAt(0, 1, 3);

    // 선택된 카드 위치를 좁게 재조정
    const newPositions = [
      { x: -2, y: 1.5, z: 4 },
      { x: 0, y: 1.5, z: 4 },
      { x: 2, y: 1.5, z: 4 },
    ];
    selectedCards.forEach((card, i) => {
      gsap.to(card.position, { x: newPositions[i].x, y: newPositions[i].y, z: newPositions[i].z, duration: 0.5 });
    });

    const wrap = document.getElementById('tarotResult');
    const posLabels = [_L('과거', 'Past'), _L('현재', 'Present'), _L('미래', 'Future')];
    const posIcons = ['⏮️', '⏺️', '⏭️'];

    let html = '';

    // 각 카드 해석
    data.cards.forEach((card, i) => {
      html += `<div class="tarot-result-card">
        <h3>${posIcons[i]} ${posLabels[i]}</h3>
        <div style="margin-bottom:10px">
          <span class="tarot-card-name">${lang() === 'en' ? card.name : card.nameKo} (${lang() === 'en' ? card.nameKo : card.name})</span>
          ${card.reversed ? `<span class="tarot-card-reversed">${_L('역방향', 'Reversed')}</span>` : `<span style="color:#4CAF50;font-size:0.75rem;margin-left:6px">${_L('정방향', 'Upright')}</span>`}
        </div>
        <p>${card.interpretation}</p>
      </div>`;
    });

    // 종합
    html += `<div class="tarot-result-card">
      <h3>✨ ${_L('종합 해석', 'Overall Reading')}</h3>
      <p>${data.overall}</p>
    </div>`;

    // 조언
    html += `<div class="tarot-result-card">
      <h3>💡 ${_L('조언', 'Advice')}</h3>
      <p>${data.advice}</p>
    </div>`;

    // 키워드
    if (data.keywords && data.keywords.length) {
      html += `<div class="tarot-result-card">
        <h3>🔑 ${_L('키워드', 'Keywords')}</h3>
        <div class="tarot-keywords">
          ${data.keywords.map(k => `<span class="tarot-keyword">${k}</span>`).join('')}
        </div>
      </div>`;
    }

    // 버튼
    html += `<div class="tarot-btn-wrap">
      <button class="tarot-reset-btn" onclick="location.reload()">${_L('다시 뽑기', 'Draw Again')}</button>
    </div>`;

    wrap.innerHTML = html;
    wrap.classList.add('show');
    wrap.scrollIntoView({ behavior: 'smooth' });
  }

  function showError(msg) {
    const wrap = document.getElementById('tarotResult');
    wrap.innerHTML = `<div class="tarot-result-card">
      <h3>⚠️ ${_L('오류', 'Error')}</h3>
      <p>${msg}</p>
    </div>
    <div class="tarot-btn-wrap">
      <button class="tarot-reset-btn" onclick="location.reload()">${_L('다시 시도', 'Try Again')}</button>
    </div>`;
    wrap.classList.add('show');
  }

  // ===== Render Loop =====
  function animate(time) {
    requestAnimationFrame(animate);
    checkHover();
    floatSelectedCards(time);
    // 배경 별 회전
    if (stars) stars.rotation.y += 0.0001;
    // 라이트 움직임
    pointLight.position.x = Math.sin(time * 0.0005) * 3;
    pointLight2.position.z = Math.cos(time * 0.0007) * 3;
    renderer.render(scene, camera);
  }

  // ===== Resize =====
  function onResize() {
    const cfg = getCameraConfig();
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.fov = cfg.fov;
    camera.updateProjectionMatrix();
    if (phase === 'selecting') {
      camera.position.set(0, cfg.y, cfg.z);
      camera.lookAt(0, 0, 0);
      renderer.setSize(window.innerWidth, window.innerHeight);
      layoutCards();
    } else if (phase === 'result') {
      renderer.setSize(window.innerWidth, 300);
      camera.aspect = window.innerWidth / 300;
      camera.updateProjectionMatrix();
    } else {
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
  }

  // ===== Init =====
  MAJOR_ARCANA.forEach((card, i) => createCard(card, i));
  layoutCards();
  dealCards();

  canvas.addEventListener('pointermove', onPointerMove);
  canvas.addEventListener('click', onPointerClick);
  window.addEventListener('resize', onResize);

  requestAnimationFrame(animate);

  // 언어 전환 시 placeholder 업데이트
  const origChangeLang = window.changeLang;
  window.changeLang = function(l) {
    origChangeLang(l);
    const q = document.getElementById('tarotQuestion');
    if (q) q.placeholder = l === 'en' ? 'Enter your question (optional)' : '질문을 입력하세요 (선택사항)';
  };

})();
</script>
</body>
</html>
