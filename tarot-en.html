/* ===== 카드 그리드 (선택 화면) ===== */
.tarot-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;

}
@media (min-width: 600px) { .tarot-grid { grid-template-columns: repeat(8, 1fr); gap: 12px; } }

/* ===== 카드 (2D + CSS 3D 플립) ===== */
.tarot-card {
  position: relative;
  aspect-ratio: 5 / 8.5;
  cursor: pointer;
  transform-style: preserve-3d;
  transition: transform 0.3s, box-shadow 0.3s;
  border-radius: 8px;
  opacity: 0;
  transform: translateY(40px) scale(0.8);
}
.tarot-card:hover {
  transform: translateY(-6px) scale(1.06);
  box-shadow: 0 8px 25px rgba(201,160,68,0.4);
  z-index: 10;
}
.tarot-card.selected {
  transform: translateY(-10px) scale(1.08);
  box-shadow: 0 0 20px rgba(201,160,68,0.6), 0 12px 30px rgba(201,160,68,0.3);
  z-index: 20;
}
.tarot-card.selected::after {
  content: '✓';
  position: absolute;
  top: -8px; right: -8px;
  width: 24px; height: 24px;
  background: #c9a044;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: #fff;
  font-weight: 700;
  z-index: 5;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.tarot-card.unselected {
  opacity: 0.3;
  pointer-events: none;
  transform: scale(0.9);
  filter: grayscale(0.5);
}
.tarot-card.flipping { animation: cardFlip 0.8s ease-in-out forwards; }
@keyframes cardFlip {
  0% { transform: rotateY(0deg); }
  50% { transform: rotateY(90deg); }
  100% { transform: rotateY(0deg); }
}

/* 카드 앞/뒤 */
.card-face {
  position: absolute;
  inset: 0;
  border-radius: 8px;
  backface-visibility: hidden;
  overflow: hidden;
}
.card-back {
  background: linear-gradient(145deg, #3d2266, #1e1040);
  border: 2px solid #c9a044;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
/* Vertical ellipse (card proportion) */
.card-back-circle {
  position: absolute;
  width: 70%;
  height: 55%;
  border: 1px solid rgba(201,160,68,0.15);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
.card-back-circle::after {
  content: '';
  position: absolute;
  inset: 14%;
  border: 1px solid rgba(201,160,68,0.1);
  border-radius: 50%;
}
/* Center diamond (static, vertical ratio) */
.card-back-pattern {
  width: 45%;
  height: 35%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 1;
}
.card-back-pattern::before {
  content: '';
  position: absolute;
  width: 80%;
  height: 80%;
  border: 1.5px solid rgba(201,160,68,0.45);
  transform: rotate(45deg);
}
.card-back-pattern::after {
  content: '';
  position: absolute;
  width: 50%;
  height: 50%;
  border: 1px solid rgba(201,160,68,0.25);
  transform: rotate(45deg);
}
/* Top/bottom ornaments */
.card-back-ornament {
  color: rgba(201,160,68,0.5);
  font-size: clamp(8px, 2vw, 14px);
  z-index: 1;
  line-height: 1;
}
/* Center symbol */
.card-back-symbol {
  color: #c9a044;
  font-size: clamp(14px, 3.5vw, 30px);
  z-index: 2;
  text-shadow: 0 0 12px rgba(201,160,68,0.5), 0 0 30px rgba(201,160,68,0.15);
}
/* KARMA text */
.card-back-text {
  background: linear-gradient(180deg, #f0d870, #c9a044, #8a6820);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-size: clamp(7px, 1.5vw, 13px);
  letter-spacing: clamp(1.5px, 0.4vw, 4px);
  margin-top: 8px;
  font-weight: 700;
  z-index: 1;
}
/* Corner decorations */
.card-back-corner {
  position: absolute;
  width: 12px;
  height: 12px;
  border-color: rgba(201,160,68,0.4);
  border-style: solid;
  z-index: 1;
}
.card-back-corner:nth-child(1) { top: 7%; left: 9%; border-width: 1px 0 0 1px; }
.card-back-corner:nth-child(2) { top: 7%; right: 9%; border-width: 1px 1px 0 0; }
.card-back-corner:nth-child(3) { bottom: 7%; left: 9%; border-width: 0 0 1px 1px; }
.card-back-corner:nth-child(4) { bottom: 7%; right: 9%; border-width: 0 1px 1px 0; }
.card-front {

}
.card-front img {

/* ===== 별 배경 ===== */
.stars-bg {
  position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none;
}
.star {

  background: #fff;

/* ===== 카드 공개 파티클 ===== */
.reveal-particles {
  position: fixed; inset: 0; z-index: 999; pointer-events: none; overflow: hidden;
}
.particle {
  position: absolute;
  border-radius: 50%;
  animation: particleFly 1.5s ease-out forwards;
}
@keyframes particleFly {
  0% { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }

/* ===== 결과 카드 떠다니는 효과 ===== */
.tarot-card-img-wrap { animation: cardFloat 3s ease-in-out infinite; }
.tarot-card-column:nth-child(1) .tarot-card-img-wrap { animation-delay: 0s; }
.tarot-card-column:nth-child(2) .tarot-card-img-wrap { animation-delay: 1s; }
.tarot-card-column:nth-child(3) .tarot-card-img-wrap { animation-delay: 2s; }
@keyframes cardFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
.tarot-card-img-wrap.reversed { animation: cardFloatReversed 3s ease-in-out infinite; }
@keyframes cardFloatReversed {
  0%,100% { transform: rotate(180deg) translateY(0); }
  50% { transform: rotate(180deg) translateY(-6px); }
}

/* ===== 카드 골드 글로우 ===== */
.tarot-card.selected {

  const grid = document.getElementById('tarotGrid');

  MAJOR_ARCANA.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'tarot-card';
    el.dataset.id = card.id;
    el.innerHTML = `
      <div class="card-face card-back">
        <div class="card-back-corner"></div>
        <div class="card-back-corner"></div>
        <div class="card-back-corner"></div>
        <div class="card-back-corner"></div>
        <div class="card-back-circle"></div>
        <span class="card-back-ornament">✧</span>
        <div class="card-back-pattern">
          <span class="card-back-symbol">✦</span>
        </div>
        <div class="card-back-text">KARMA</div>
        <span class="card-back-ornament">✧</span>
      </div>
    `;
    el.addEventListener('click', () => toggleCard(el, card));
    grid.appendChild(el);

    // 딜링 애니메이션 (순차적으로 나타남)
    gsap.to(el, {
      opacity: 1,
      y: 0,
      scale: 1,
      duration: 0.4,
      delay: i * 0.03,
      ease: 'back.out(1.5)',
    });
  });

  // ===== 카드 선택/해제 =====
  function toggleCard(el, card) {
    if (phase !== 'selecting') return;

    const idx = selectedCards.findIndex(c => c.id === card.id);
    if (idx !== -1) {
      // 선택 해제
      selectedCards.splice(idx, 1);
      el.classList.remove('selected');
      updateCards();
    } else if (selectedCards.length < 3) {
      // 선택
      selectedCards.push({ ...card, el });
      el.classList.add('selected');
      updateCards();

      if (selectedCards.length === 3) {
        setTimeout(startReading, 500);
      }
    }
    updateSelectedInfo();
  }

  function updateCards() {
    const allCards = grid.querySelectorAll('.tarot-card');
    if (selectedCards.length === 3) {
      allCards.forEach(c => {
        if (!c.classList.contains('selected')) c.classList.add('unselected');
      });
    } else {
      allCards.forEach(c => c.classList.remove('unselected'));
    }
  }

  function updateSelectedInfo() {
    const info = document.getElementById('selectedInfo');
    info.textContent = selectedCards.length > 0
      ? _L(`${selectedCards.length}/3 장 선택됨`, `${selectedCards.length}/3 cards selected`)
      : '';
  }

  // ===== 리딩 시작 =====
  function startReading() {
    phase = 'reading';
    document.getElementById('tarotInstruction').style.display = 'none';
    document.getElementById('selectedInfo').style.display = 'none';
    document.getElementById('questionWrap').style.display = 'none';

    // 선택되지 않은 카드 사라지기
    grid.querySelectorAll('.tarot-card:not(.selected)').forEach(c => {
      gsap.to(c, { opacity: 0, scale: 0.5, duration: 0.3, ease: 'power2.in' });
    });

    // 선택된 카드 플립 (뒷면 → 앞면)
    setTimeout(() => {
      selectedCards.forEach((card, i) => {
        card.reversed = Math.random() < 0.5;
        const el = card.el;

        setTimeout(() => {
          el.classList.add('flipping');

          // 플립 중간(0.4초)에 앞면으로 교체
          setTimeout(() => {
            el.innerHTML = `
              <div class="card-face card-front" style="${card.reversed ? 'transform:rotate(180deg)' : ''}">
                <img src="${getCardImageUrl(card.id)}" alt="${card.nameKo}">
              </div>
            `;
          }, 400);

          // 플립 완료 후
          setTimeout(() => {
            el.classList.remove('flipping');
            if (i === 2) {
              // 마지막 카드 플립 후 → 파티클 + API 호출
              createRevealParticles();
              setTimeout(() => {
                grid.style.display = 'none';
                document.getElementById('tarotLoading').classList.add('show');
                requestReading();
              }, 800);
            }
          }, 800);
        }, i * 400);
      });
    }, 600);
  }

  // ===== API 호출 =====
  let _tarotInput = null;
  let _tarotResult = null;
  async function requestReading() {
    const cardsData = selectedCards.map(c => ({ id: c.id, reversed: c.reversed }));
    const question = document.getElementById('tarotQuestion').value.trim();

    try {
      const input = { cards: cardsData, question, lang: lang() };
      const resp = await fetch(API_BASE + '/api/tarot', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(input),
      });
      const data = await resp.json();
      if (data.error) throw new Error(data.error);
      _tarotInput = input;
      _tarotResult = data;
      document.getElementById('tarotLoading').classList.remove('show');
      showResult(data);
    } catch (err) {
      document.getElementById('tarotLoading').classList.remove('show');
      showError(err.message);
    }
  }

  // ===== 결과 표시 =====
  function showResult(data) {
    phase = 'result';
    const wrap = document.getElementById('tarotResult');
    const posLabels = [_L('과거', 'Past'), _L('현재', 'Present'), _L('미래', 'Future')];

    let html = '';

    // 카드 3장 이미지 (크고 선명하게)
    html += '<div class="tarot-cards-display">';
    data.cards.forEach((card, i) => {
      html += `<div class="tarot-card-column">
        <div class="tarot-card-position">${posLabels[i]}</div>
        <div class="tarot-card-img-wrap${card.reversed ? ' reversed' : ''}">
          <img src="${getCardImageUrl(card.id)}" alt="${card.nameKo}" class="tarot-card-img">
        </div>
        <div class="tarot-card-label">
          <span class="tarot-card-name">${lang() === 'en' ? card.name : card.nameKo}</span>
          ${card.reversed
            ? `<span class="tarot-card-reversed">${_L('역방향', 'Reversed')}</span>`
            : `<span style="color:#4CAF50;font-size:0.75rem">${_L('정방향', 'Upright')}</span>`}
        </div>
      </div>`;
    });
    html += '</div>';

    // 각 카드 해석
    data.cards.forEach((card, i) => {
      html += `<div class="tarot-result-card">
        <h3>${posLabels[i]} — ${lang() === 'en' ? card.name : card.nameKo}</h3>
        <p>${card.interpretation}</p>
      </div>`;
    });

    // 종합
    html += `<div class="tarot-result-card">
      <h3>✨ ${_L('종합 해석', 'Overall Reading')}</h3>
      <p>${data.overall}</p>
    </div>`;

    // 조언
    html += `<div class="tarot-result-card">
      <h3>💡 ${_L('조언', 'Advice')}</h3>
      <p>${data.advice}</p>
    </div>`;

    // 키워드
    if (data.keywords && data.keywords.length) {
      html += `<div class="tarot-result-card">
        <h3>🔑 ${_L('키워드', 'Keywords')}</h3>
        <div class="tarot-keywords">
          ${data.keywords.map(k => `<span class="tarot-keyword">${k}</span>`).join('')}
        </div>
      </div>`;
    }

    // 카카오톡 공유
    html += `<div class="tarot-result-card" style="text-align:center">
      <button class="btn btn-kakao" id="tarotShareBtn" style="max-width:320px;margin:0 auto">💬 ${_L('카카오톡으로 결과 공유', 'Share result on KakaoTalk')}</button>
    </div>`;

    // 버튼
    html += `<div class="tarot-btn-wrap">
      <button class="tarot-reset-btn" onclick="location.reload()">${_L('다시 뽑기', 'Draw Again')}</button>
    </div>`;

    wrap.innerHTML = html;
    wrap.classList.add('show');
    const shareBtn = document.getElementById('tarotShareBtn');
    if (shareBtn) shareBtn.addEventListener('click', () => {
      KarmaShare.shareKakao(
        _L('내 타로 리딩 결과', 'My Tarot Reading'),
        _L('AI 타로 리딩 결과를 확인해보세요', 'Check out my AI tarot reading')
      );
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function showResultShared(result) {
    phase = 'result';
    const qw = document.getElementById('questionWrap');
    if (qw) qw.style.display = 'none';
    const inst = document.getElementById('tarotInstruction');
    if (inst) inst.style.display = 'none';
    const info = document.getElementById('selectedInfo');
    if (info) info.style.display = 'none';
    const grid = document.getElementById('tarotGrid');
    if (grid) grid.style.display = 'none';
    showResult(result);
  }

  function showError(msg) {
    const wrap = document.getElementById('tarotResult');
    wrap.innerHTML = `<div class="tarot-result-card">
      <h3>⚠️ ${_L('오류', 'Error')}</h3>
      <p>${msg}</p>
    </div>
    <div class="tarot-btn-wrap">
      <button class="tarot-reset-btn" onclick="location.reload()">${_L('다시 시도', 'Try Again')}</button>
    </div>`;
    wrap.classList.add('show');
  }

  // 언어 전환 시 placeholder 업데이트
  const origChangeLang = window.changeLang;
  window.changeLang = function(l) {
    origChangeLang(l);
    const q = document.getElementById('tarotQuestion');
    if (q) q.placeholder = l === 'en' ? 'Enter your question (optional)' : '질문을 입력하세요 (선택사항)';
  };

  KarmaShare.init({
    type: 'tarot',
    lang: 'en',
    pageBase: '/tarot-en',
    getPayload: () => ({ input: _tarotInput, result: _tarotResult }),
    onLoadShared: ({ input, result }) => {
      _tarotInput = input;
      _tarotResult = result;
      showResultShared(result);
    },
  });

})();
</script>
</body>
</html>
