<style>
/* ===== 타로 페이지 전용 스타일 ===== */
.tarot-page { max-width: 700px; margin: 0 auto; padding: 24px 16px; padding-top: 56px; }
.tarot-page h1 { font-size: 1.8rem; margin-bottom: 4px; }

/* 질문 입력 */
.tarot-question-wrap { margin-bottom: 20px; }
.tarot-question {
  width: 100%;
  padding: 14px 18px;
  border: 1px solid rgba(201,160,68,0.3);
  border-radius: 12px;
  background: rgba(15,12,28,0.8);
  color: #e8e0d0;
  font-family: 'Noto Serif KR', serif;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.3s;
}
.tarot-question:focus { border-color: #c9a044; }
.tarot-question::placeholder { color: #555; }

/* 안내 문구 */
.tarot-instruction {
  text-align: center;
  color: #c9a044;
  font-size: 0.9rem;
  margin-bottom: 6px;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
.tarot-selected-info { text-align: center; color: #9a8e7e; font-size: 0.82rem; margin-bottom: 16px; }

/* ===== 카드 그리드 (선택 화면) ===== */
.tarot-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  perspective: 1200px;
}
@media (min-width: 600px) { .tarot-grid { grid-template-columns: repeat(8, 1fr); gap: 12px; } }
@media (min-width: 900px) { .tarot-grid { grid-template-columns: repeat(11, 1fr); gap: 14px; } }

/* ===== 카드 (2D + CSS 3D 플립) ===== */
.tarot-card {
  position: relative;
  aspect-ratio: 5 / 8.5;
  cursor: pointer;
  transform-style: preserve-3d;
  transition: transform 0.3s, box-shadow 0.3s;
  border-radius: 8px;
  opacity: 0;
  transform: translateY(40px) scale(0.8);
}
.tarot-card:hover {
  transform: translateY(-6px) scale(1.06);
  box-shadow: 0 8px 25px rgba(201,160,68,0.4);
  z-index: 10;
}
.tarot-card.selected {
  transform: translateY(-10px) scale(1.08);
  box-shadow: 0 0 20px rgba(201,160,68,0.6), 0 12px 30px rgba(201,160,68,0.3);
  z-index: 20;
}
.tarot-card.selected::after {
  content: '✓';
  position: absolute;
  top: -8px; right: -8px;
  width: 24px; height: 24px;
  background: #c9a044;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: #fff;
  font-weight: 700;
  z-index: 5;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.tarot-card.unselected {
  opacity: 0.3;
  pointer-events: none;
  transform: scale(0.9);
  filter: grayscale(0.5);
}
.tarot-card.flipping { animation: cardFlip 0.8s ease-in-out forwards; }
@keyframes cardFlip {
  0% { transform: rotateY(0deg); }
  50% { transform: rotateY(90deg); }
  100% { transform: rotateY(0deg); }
}

/* 카드 앞/뒤 */
.card-face {
  position: absolute;
  inset: 0;
  border-radius: 8px;
  backface-visibility: hidden;
  overflow: hidden;
}
.card-back {
  background: linear-gradient(145deg, #3d2266, #1e1040);
  border: 2px solid #c9a044;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.card-back-pattern {
  width: 60%;
  height: 60%;
  border: 1.5px solid rgba(201,160,68,0.4);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.card-back-pattern::before {
  content: '✦';
  color: #c9a044;
  font-size: clamp(16px, 4vw, 28px);
}
.card-back-pattern::after {
  content: '';
  position: absolute;
  inset: 8px;
  border: 1px solid rgba(201,160,68,0.25);
  border-radius: 50%;
}
.card-back-text {
  color: rgba(201,160,68,0.6);
  font-size: clamp(7px, 1.6vw, 10px);
  letter-spacing: 2px;
  margin-top: 8px;
  font-weight: 600;
}
.card-front {
  border: 2px solid rgba(201,160,68,0.4);
}
.card-front img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* ===== 결과 카드 3장 (크게) ===== */
.tarot-cards-display {
  display: flex;
  justify-content: center;
  gap: 16px;
  padding: 20px 0 24px;
}
.tarot-card-column {
  flex: 1;
  max-width: 180px;
  text-align: center;
}
.tarot-card-position {
  color: #c9a044;
  font-size: 0.85rem;
  font-weight: 700;
  margin-bottom: 8px;
  letter-spacing: 1px;
}
.tarot-card-img-wrap {
  border-radius: 10px;
  overflow: hidden;
  border: 2px solid rgba(201,160,68,0.4);
  box-shadow: 0 4px 20px rgba(201,160,68,0.15), 0 0 40px rgba(10,10,30,0.8);
  transition: transform 0.3s, box-shadow 0.3s;
}
.tarot-card-img-wrap:hover {
  transform: scale(1.03);
  box-shadow: 0 8px 30px rgba(201,160,68,0.3);
}
.tarot-card-img-wrap.reversed { transform: rotate(180deg); }
.tarot-card-img-wrap.reversed:hover { transform: rotate(180deg) scale(1.03); }
.tarot-card-img { width: 100%; height: auto; display: block; }
.tarot-card-label {
  margin-top: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
@media (max-width: 480px) {
  .tarot-cards-display { gap: 8px; }
  .tarot-card-position { font-size: 0.75rem; }
}

/* ===== 결과 카드 ===== */
.tarot-result-wrap { display: none; }
.tarot-result-wrap.show { display: block; }
.tarot-result-card {
  background: rgba(15,12,28,0.9);
  border: 1px solid rgba(201,160,68,0.2);
  border-radius: 16px;
  padding: 24px 20px;
  margin-bottom: 16px;
  backdrop-filter: blur(10px);
}
.tarot-result-card h3 {
  color: #c9a044;
  font-size: 1rem;
  margin-bottom: 12px;
}
.tarot-result-card p {
  color: #ccc;
  font-size: 0.88rem;
  line-height: 1.8;
}
.tarot-card-name { color: #f0d48a; font-weight: 700; font-size: 0.85rem; }
.tarot-card-reversed { color: #e94560; font-size: 0.75rem; }
.tarot-keywords { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.tarot-keyword {
  background: rgba(201,160,68,0.15);
  color: #c9a044;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.78rem;
  border: 1px solid rgba(201,160,68,0.2);
}

/* 로딩 */
.tarot-loading { text-align: center; padding: 40px 20px; display: none; }
.tarot-loading.show { display: block; }
.tarot-loading-text { color: #c9a044; font-size: 0.95rem; margin-top: 16px; }
.tarot-spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(201,160,68,0.2);
  border-top-color: #c9a044;
  border-radius: 50%;
  margin: 0 auto;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 버튼 */
.tarot-reset-btn {
  display: inline-block;
  padding: 12px 32px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(135deg, #8b5e2f, #c9a044);
  color: #fff;
  font-family: 'Noto Serif KR', serif;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  margin: 8px;
  transition: transform 0.2s, box-shadow 0.2s;
}
.tarot-reset-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(201,160,68,0.4);
}
.tarot-btn-wrap { text-align: center; margin-top: 20px; }

/* ===== 별 배경 ===== */
.stars-bg {
  position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none;
}
.star {
  position: absolute;
  background: #fff;
  border-radius: 50%;
  animation: twinkle var(--dur) ease-in-out infinite;
}
@keyframes twinkle { 0%,100%{opacity:0.2;transform:scale(1)} 50%{opacity:1;transform:scale(1.5)} }

/* ===== 카드 공개 파티클 ===== */
.reveal-particles {
  position: fixed; inset: 0; z-index: 999; pointer-events: none; overflow: hidden;
}
.particle {
  position: absolute;
  border-radius: 50%;
  animation: particleFly 1.5s ease-out forwards;
}
@keyframes particleFly {
  0% { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
}

/* ===== 결과 카드 떠다니는 효과 ===== */
.tarot-card-img-wrap { animation: cardFloat 3s ease-in-out infinite; }
.tarot-card-column:nth-child(1) .tarot-card-img-wrap { animation-delay: 0s; }
.tarot-card-column:nth-child(2) .tarot-card-img-wrap { animation-delay: 1s; }
.tarot-card-column:nth-child(3) .tarot-card-img-wrap { animation-delay: 2s; }
@keyframes cardFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
.tarot-card-img-wrap.reversed { animation: cardFloatReversed 3s ease-in-out infinite; }
@keyframes cardFloatReversed {
  0%,100% { transform: rotate(180deg) translateY(0); }
  50% { transform: rotate(180deg) translateY(-6px); }
}

/* ===== 카드 골드 글로우 ===== */
.tarot-card.selected {
  animation: selectedGlow 1.5s ease-in-out infinite;
}
@keyframes selectedGlow {
  0%,100% { box-shadow: 0 0 15px rgba(201,160,68,0.4), 0 8px 20px rgba(201,160,68,0.2); }
  50% { box-shadow: 0 0 30px rgba(201,160,68,0.7), 0 12px 30px rgba(201,160,68,0.4); }
}
</style>

<script>
(function() {
  'use strict';

  const API_BASE = 'https://karma-api.yama5993.workers.dev';
  const lang = () => document.documentElement.lang || 'ko';
  const _L = (ko, en) => lang() === 'en' ? en : ko;

  // ===== 별 배경 생성 =====
  (function createStars() {
    const bg = document.getElementById('starsBg');
    for (let i = 0; i < 80; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 3 + 1;
      star.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%; top:${Math.random()*100}%;
        --dur:${2+Math.random()*3}s;
        animation-delay:${Math.random()*3}s;
      `;
      bg.appendChild(star);
    }
  })();

  // ===== 파티클 폭발 이펙트 =====
  function createRevealParticles() {
    const container = document.createElement('div');
    container.className = 'reveal-particles';
    document.body.appendChild(container);
    const colors = ['#c9a044','#f0d48a','#e0c060','#4466ff','#88aaff','#fff'];
    for (let i = 0; i < 60; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 8 + 3;
      const tx = (Math.random() - 0.5) * window.innerWidth * 0.8;
      const ty = (Math.random() - 0.5) * window.innerHeight * 0.8;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:50%; top:50%;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        --tx:${tx}px; --ty:${ty}px;
        animation-delay:${Math.random()*0.3}s;
        animation-duration:${1+Math.random()*1}s;
      `;
      container.appendChild(p);
    }
    setTimeout(() => container.remove(), 2500);
  }

  // ===== 카드 데이터 =====
  const MAJOR_ARCANA = [
    { id: 0, name: 'The Fool', nameKo: '광대' },
    { id: 1, name: 'The Magician', nameKo: '마법사' },
    { id: 2, name: 'The High Priestess', nameKo: '여사제' },
    { id: 3, name: 'The Empress', nameKo: '여황제' },
    { id: 4, name: 'The Emperor', nameKo: '황제' },
    { id: 5, name: 'The Hierophant', nameKo: '교황' },
    { id: 6, name: 'The Lovers', nameKo: '연인' },
    { id: 7, name: 'The Chariot', nameKo: '전차' },
    { id: 8, name: 'Strength', nameKo: '힘' },
    { id: 9, name: 'The Hermit', nameKo: '은둔자' },
    { id: 10, name: 'Wheel of Fortune', nameKo: '운명의 수레바퀴' },
    { id: 11, name: 'Justice', nameKo: '정의' },
    { id: 12, name: 'The Hanged Man', nameKo: '매달린 사람' },
    { id: 13, name: 'Death', nameKo: '죽음' },
    { id: 14, name: 'Temperance', nameKo: '절제' },
    { id: 15, name: 'The Devil', nameKo: '악마' },
    { id: 16, name: 'The Tower', nameKo: '탑' },
    { id: 17, name: 'The Star', nameKo: '별' },
    { id: 18, name: 'The Moon', nameKo: '달' },
    { id: 19, name: 'The Sun', nameKo: '태양' },
    { id: 20, name: 'Judgement', nameKo: '심판' },
    { id: 21, name: 'The World', nameKo: '세계' },
  ];

  function getCardImageUrl(id) {
    return '/images/tarot/ar' + String(id).padStart(2, '0') + '.webp';
  }

  // ===== 상태 =====
  const selectedCards = [];
  let phase = 'selecting';

  // ===== 카드 그리드 생성 =====
  const grid = document.getElementById('tarotGrid');

  MAJOR_ARCANA.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'tarot-card';
    el.dataset.id = card.id;
    el.innerHTML = `
      <div class="card-face card-back">
        <div class="card-back-pattern"></div>
        <div class="card-back-text">KARMA</div>
      </div>
    `;
    el.addEventListener('click', () => toggleCard(el, card));
    grid.appendChild(el);

    // 딜링 애니메이션 (순차적으로 나타남)
    gsap.to(el, {
      opacity: 1,
      y: 0,
      scale: 1,
      duration: 0.4,
      delay: i * 0.03,
      ease: 'back.out(1.5)',
    });
  });

  // ===== 카드 선택/해제 =====
  function toggleCard(el, card) {
    if (phase !== 'selecting') return;

    const idx = selectedCards.findIndex(c => c.id === card.id);
    if (idx !== -1) {
      // 선택 해제
      selectedCards.splice(idx, 1);
      el.classList.remove('selected');
      updateCards();
    } else if (selectedCards.length < 3) {
      // 선택
      selectedCards.push({ ...card, el });
      el.classList.add('selected');
      updateCards();

      if (selectedCards.length === 3) {
        setTimeout(startReading, 500);
      }
    }
    updateSelectedInfo();
  }

  function updateCards() {
    const allCards = grid.querySelectorAll('.tarot-card');
    if (selectedCards.length === 3) {
      allCards.forEach(c => {
        if (!c.classList.contains('selected')) c.classList.add('unselected');
      });
    } else {
      allCards.forEach(c => c.classList.remove('unselected'));
    }
  }

  function updateSelectedInfo() {
    const info = document.getElementById('selectedInfo');
    info.textContent = selectedCards.length > 0
      ? _L(`${selectedCards.length}/3 장 선택됨`, `${selectedCards.length}/3 cards selected`)
      : '';
  }

  // ===== 리딩 시작 =====
  function startReading() {
    phase = 'reading';
    document.getElementById('tarotInstruction').style.display = 'none';
    document.getElementById('selectedInfo').style.display = 'none';
    document.getElementById('questionWrap').style.display = 'none';

    // 선택되지 않은 카드 사라지기
    grid.querySelectorAll('.tarot-card:not(.selected)').forEach(c => {
      gsap.to(c, { opacity: 0, scale: 0.5, duration: 0.3, ease: 'power2.in' });
    });

    // 선택된 카드 플립 (뒷면 → 앞면)
    setTimeout(() => {
      selectedCards.forEach((card, i) => {
        card.reversed = Math.random() < 0.5;
        const el = card.el;

        setTimeout(() => {
          el.classList.add('flipping');

          // 플립 중간(0.4초)에 앞면으로 교체
          setTimeout(() => {
            el.innerHTML = `
              <div class="card-face card-front" style="${card.reversed ? 'transform:rotate(180deg)' : ''}">
                <img src="${getCardImageUrl(card.id)}" alt="${card.nameKo}">
              </div>
            `;
          }, 400);

          // 플립 완료 후
          setTimeout(() => {
            el.classList.remove('flipping');
            if (i === 2) {
              // 마지막 카드 플립 후 → 파티클 + API 호출
              createRevealParticles();
              setTimeout(() => {
                grid.style.display = 'none';
                document.getElementById('tarotLoading').classList.add('show');
                requestReading();
              }, 800);
            }
          }, 800);
        }, i * 400);
      });
    }, 600);
  }

  // ===== API 호출 =====
  async function requestReading() {
    const cardsData = selectedCards.map(c => ({ id: c.id, reversed: c.reversed }));
    const question = document.getElementById('tarotQuestion').value.trim();

    try {
      const resp = await fetch(API_BASE + '/api/tarot', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cards: cardsData, question, lang: lang() }),
      });
      const data = await resp.json();
      if (data.error) throw new Error(data.error);
      document.getElementById('tarotLoading').classList.remove('show');
      showResult(data);
    } catch (err) {
      document.getElementById('tarotLoading').classList.remove('show');
      showError(err.message);
    }
  }

  // ===== 결과 표시 =====
  function showResult(data) {
    phase = 'result';
    const wrap = document.getElementById('tarotResult');
    const posLabels = [_L('과거', 'Past'), _L('현재', 'Present'), _L('미래', 'Future')];

    let html = '';

    // 카드 3장 이미지 (크고 선명하게)
    html += '<div class="tarot-cards-display">';
    data.cards.forEach((card, i) => {
      html += `<div class="tarot-card-column">
        <div class="tarot-card-position">${posLabels[i]}</div>
        <div class="tarot-card-img-wrap${card.reversed ? ' reversed' : ''}">
          <img src="${getCardImageUrl(card.id)}" alt="${card.nameKo}" class="tarot-card-img">
        </div>
        <div class="tarot-card-label">
          <span class="tarot-card-name">${lang() === 'en' ? card.name : card.nameKo}</span>
          ${card.reversed
            ? `<span class="tarot-card-reversed">${_L('역방향', 'Reversed')}</span>`
            : `<span style="color:#4CAF50;font-size:0.75rem">${_L('정방향', 'Upright')}</span>`}
        </div>
      </div>`;
    });
    html += '</div>';

    // 각 카드 해석
    data.cards.forEach((card, i) => {
      html += `<div class="tarot-result-card">
        <h3>${posLabels[i]} — ${lang() === 'en' ? card.name : card.nameKo}</h3>
        <p>${card.interpretation}</p>
      </div>`;
    });

    // 종합
    html += `<div class="tarot-result-card">
      <h3>✨ ${_L('종합 해석', 'Overall Reading')}</h3>
      <p>${data.overall}</p>
    </div>`;

    // 조언
    html += `<div class="tarot-result-card">
      <h3>💡 ${_L('조언', 'Advice')}</h3>
      <p>${data.advice}</p>
    </div>`;

    // 키워드
    if (data.keywords && data.keywords.length) {
      html += `<div class="tarot-result-card">
        <h3>🔑 ${_L('키워드', 'Keywords')}</h3>
        <div class="tarot-keywords">
          ${data.keywords.map(k => `<span class="tarot-keyword">${k}</span>`).join('')}
        </div>
      </div>`;
    }

    // 버튼
    html += `<div class="tarot-btn-wrap">
      <button class="tarot-reset-btn" onclick="location.reload()">${_L('다시 뽑기', 'Draw Again')}</button>
    </div>`;

    wrap.innerHTML = html;
    wrap.classList.add('show');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function showError(msg) {
    const wrap = document.getElementById('tarotResult');
    wrap.innerHTML = `<div class="tarot-result-card">
      <h3>⚠️ ${_L('오류', 'Error')}</h3>
      <p>${msg}</p>
    </div>
    <div class="tarot-btn-wrap">
      <button class="tarot-reset-btn" onclick="location.reload()">${_L('다시 시도', 'Try Again')}</button>
    </div>`;
    wrap.classList.add('show');
  }

  // 언어 전환 시 placeholder 업데이트
  const origChangeLang = window.changeLang;
  window.changeLang = function(l) {
    origChangeLang(l);
    const q = document.getElementById('tarotQuestion');
    if (q) q.placeholder = l === 'en' ? 'Enter your question (optional)' : '질문을 입력하세요 (선택사항)';
  };

})();
</script>
</body>
</html>
